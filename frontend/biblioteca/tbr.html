<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Pendientes (TBR) | Yaihi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Tu archivo de estilos personalizados -->
    <link rel="stylesheet" href="..style.min.css">
  <link rel='stylesheet' href='..theme-mode.css?v=20260701' />
</head>
<body id="tbr" class="section-books-cyber text-white position-relative min-vh-100">

    <!-- 🌌 FONDO MULTICAPA CAPAZ DE REACCIONAR -->
    <div class="cyber-library-bg">
        <div class="matrix-lines"></div>
        <div class="neon-shelf-glow"></div>
        <div class="twitch-ambient-flare"></div>
    </div>

    <div class="container position-relative z-2 py-5" id="detalle-favorito">
        <!-- 💡 ESTILOS PERSONALIZADOS INYECTADOS DINÁMICAMENTE PARA LA VISTA DE TBR -->
        <style>
            .tbr-cyber-card {
                background: rgba(20, 15, 8, 0.6) !important;
                border: 1px solid rgba(255, 193, 7, 0.15) !important;
                border-radius: 4px;
                transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
                position: relative;
                overflow: hidden;
            }
            .tbr-cyber-card:hover {
                border-color: #ffc107 !important;
                background: rgba(35, 27, 13, 0.85) !important;
                box-shadow: 0 0 20px rgba(255, 193, 7, 0.2) !important;
                transform: translateY(-5px);
            }
            .tbr-cyber-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: #ffc107;
                opacity: 0.7;
            }
            .tbr-cover-container {
                width: 100%;
                aspect-ratio: 2 / 3;
                background: #000;
                overflow: hidden;
                position: relative;
                border-bottom: 1px solid rgba(255, 193, 7, 0.1);
            }
            .tbr-cover-container img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transition: transform 0.5s ease;
            }
            .tbr-cyber-card:hover .tbr-cover-container img {
                transform: scale(1.05);
            }
            /* Laser scan line effect on cover hover */
            .tbr-cover-container::after {
                content: '';
                position: absolute;
                top: -100%;
                left: 0;
                width: 100%;
                height: 3px;
                background: linear-gradient(90deg, transparent, #ffc107, transparent);
                box-shadow: 0 0 8px #ffc107;
                opacity: 0;
                transition: none;
            }
            .tbr-cyber-card:hover .tbr-cover-container::after {
                animation: tbr-scan 1.5s linear infinite;
                opacity: 1;
            }
            @keyframes tbr-scan {
                0% { top: -10%; }
                100% { top: 110%; }
            }
            .tbr-hype-progress {
                height: 6px;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 3px;
                overflow: hidden;
                position: relative;
            }
            .tbr-hype-bar {
                height: 100%;
                background: linear-gradient(90deg, #ffc107, #ff9800);
                box-shadow: 0 0 8px #ffc107;
                border-radius: 3px;
            }
        </style>

        <!-- CABECERA EXCLUSIVA -->
        <header class="text-center mb-5 font-monospace">
            <span class="fs-1 text-glow-warning">⏳⚙️</span>
            <h1 class="display-4 fw-bold mt-2 text-glow-warning font-orbitron">[ READ_BUFFER // TBR_QUEUE ]</h1>
            <p class="lead text-uppercase tracking-wider small" style="color: #ffc107 !important;">
                // CORES_DE_LECTURA_PENDIENTES_DE_CARGA
            </p>
        </header>

        <!-- GRID DE LIBROS PENDIENTES -->
        <main>
            <div class="row g-4 row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4" id="contenedor-tbr">
                <div class="col-12 text-center text-neon-yellow font-monospace py-5 w-100">
                    <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                    [ SYNCING_TBR_SECTOR... ]
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src='..theme-mode.js?v=20260701'></script>
</body>
</html>
