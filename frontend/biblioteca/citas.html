<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas & Frases | Yaihi</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Tu archivo de estilos personalizados -->
    <link rel="stylesheet" href="../style.min.css">
</head>
<body id="citas" class="section-books-cyber text-white position-relative min-vh-100">

    <!-- 🌌 FONDO MULTICAPA CAPAZ DE REACCIONAR -->
    <div class="cyber-library-bg">
        <div class="matrix-lines"></div>
        <div class="neon-shelf-glow"></div>
        <div class="twitch-ambient-flare"></div>
    </div>

    <div class="container position-relative z-2 py-5" id="detalle-favorito">
        <!-- 💡 ESTILOS INYECTADOS DINÁMICAMENTE PARA LAS CITAS -->
        <style>
            .citas-nav-btn {
                background: rgba(13, 9, 24, 0.6) !important;
                border: 1px solid rgba(255, 255, 255, 0.1) !important;
                color: rgba(255, 255, 255, 0.6) !important;
                font-family: monospace;
                letter-spacing: 1px;
                transition: all 0.3s ease;
            }
            .citas-nav-btn:hover {
                color: #fff !important;
                border-color: rgba(255, 255, 255, 0.3) !important;
            }
            /* Estilo activo para Citas Mágicas (Cyan) */
            #pills-magicas-tab.active {
                background: rgba(0, 240, 255, 0.1) !important;
                border-color: #00f0ff !important;
                color: #00f0ff !important;
                box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            }
            /* Estilo activo para Rincón Spicy (Magenta) */
            #pills-spicy-tab.active {
                background: rgba(255, 0, 127, 0.1) !important;
                border-color: #ff007f !important;
                color: #ff007f !important;
                box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            }
            /* Tarjetas de Citas Mágicas */
            .quote-cyber-card {
                background: rgba(13, 9, 24, 0.75) !important;
                border: 1px solid rgba(0, 240, 255, 0.15) !important;
                border-radius: 4px;
                transition: all 0.3s ease;
                position: relative;
            }
            .quote-cyber-card:hover {
                border-color: #00f0ff !important;
                box-shadow: 0 0 15px rgba(0, 240, 255, 0.15) !important;
            }
            .quote-cyber-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 3px;
                height: 100%;
                background: #00f0ff;
            }
            /* Tarjetas de Citas Spicy */
            .quote-spicy-card {
                background: rgba(20, 10, 15, 0.75) !important;
                border: 1px solid rgba(255, 0, 127, 0.15) !important;
                border-radius: 4px;
                transition: all 0.3s ease;
                position: relative;
            }
            .quote-spicy-card:hover {
                border-color: #ff007f !important;
                box-shadow: 0 0 15px rgba(255, 0, 127, 0.15) !important;
            }
            .quote-spicy-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 3px;
                height: 100%;
                background: #ff007f;
            }
        </style>

        <!-- CABECERA EXCLUSIVA -->
        <header class="text-center mb-5 font-monospace">
            <span class="fs-1 text-glow-cyan">✒️📼</span>
            <h1 class="display-4 fw-bold mt-2 text-glow-cyan font-orbitron">[ CITAS_DATA_FILE ]</h1>
            <p class="text-info lead text-uppercase tracking-wider small" style="color: #00f0ff !important;">
                // FRASES_LOG_FRAGMENTS_FROM_CORES_AND_STREAMS
            </p>
        </header>

        <!-- PESTAÑAS DE NAVEGACIÓN -->
        <ul class="nav nav-pills justify-content-center mb-5 gap-2" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-1 px-4 py-2 citas-nav-btn" id="pills-magicas-tab" data-bs-toggle="pill" data-bs-target="#pills-magicas" type="button" role="tab" aria-controls="pills-magicas" aria-selected="true">
                    [ DATA: LITERARY_CORES ]
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link rounded-1 px-4 py-2 citas-nav-btn" id="pills-spicy-tab" data-bs-toggle="pill" data-bs-target="#pills-spicy" type="button" role="tab" aria-controls="pills-spicy" aria-selected="false">
                    [ DATA: SPICY_DECK ]
                </button>
            </li>
        </ul>

        <!-- CONTENIDO DE LAS PESTAÑAS -->
        <div class="tab-content" id="pills-tabContent">
            
            <!-- ====== PESTAÑA 1: CITAS LITERARIAS ====== -->
            <div class="tab-pane fade show active" id="pills-magicas" role="tabpanel" aria-labelledby="pills-magicas-tab">
                <div class="row row-cols-1 row-cols-md-2 g-4" id="contenedor-citas-magicas">
                    
                    <div class="col-12 text-center text-neon-cyan font-monospace py-5 w-100">
                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        [ SYNCING_LITERARY_CORES... ]
                    </div>

                </div>
            </div>

            <!-- ====== PESTAÑA 2: RINCÓN SPICY ====== -->
            <div class="tab-pane fade" id="pills-spicy" role="tabpanel" aria-labelledby="pills-spicy-tab">
                <div class="row row-cols-1 row-cols-md-2 g-4" id="contenedor-citas-spicy">
                    
                    <div class="col-12 text-center text-neon-magenta font-monospace py-5 w-100">
                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        [ SYNCING_SPICY_DECK... ]
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
