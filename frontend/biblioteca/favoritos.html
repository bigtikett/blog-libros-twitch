<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libros Favoritos | Yaihi</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Iconos de Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- 1. 🌟 SWIPER CSS (Añadido para el carrusel) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- Tu archivo de estilos personalizados -->
    <link rel="stylesheet" href="..style.min.css" />
  <link rel='stylesheet' href='..theme-mode.css?v=20260701' />
  </head>
  <body id="favoritos" class="bg-light">
    <!-- ✨ SECCIÓN: ARCHIVO DE LECTURA DIGITAL -->
    <section
      id="libros-archive"
      class="py-5 section-books-cyber position-relative overflow-hidden text-white"
    >
      <!-- 🌌 FONDO MULTICAPA CAPAZ DE REACCIONAR -->
      <div class="cyber-library-bg">
        <div class="matrix-lines"></div>
        <div class="neon-shelf-glow"></div>
        <div class="twitch-ambient-flare"></div>
      </div>

      <div class="container position-relative z-2">
        <!-- El botón de retorno y tu cabecera van aquí arriba -->
      </div>

      <!-- CABECERA EXCLUSIVA -->
      <header class="container text-center my-5">
        <span class="fs-1">✨🏆✨</span>
        <h1 class="display-4 fw-bold mt-2">Mis Favoritos Absolutos</h1>
        <p class="text-b lead">
          Las historias que me marcaron, las que reelería mil veces y se
          llevaron mis 5 estrellas.
        </p>
      </header>

      <main class="container my-5">
        <!-- ================= SECCIÓN: EL TOP 3 OFICIAL (PODIO CYBERPUNK) ================= -->
        <style>
          /* --- 🏆 PODIO DE FAVORITOS (ESTILO CYBERPUNK) --- */
          .card-podium {
            background: rgba(13, 9, 24, 0.75) !important;
            border-radius: 8px !important;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
          }
          .card-podium:hover {
            transform: translateY(-8px) scale(1.02);
          }
          /* Estilo específico para el 1er Puesto (Oro) */
          .card-podium-first {
            border: 2px solid #ffc107 !important;
            box-shadow: 0 0 25px rgba(255, 193, 7, 0.25) !important;
            background: rgba(255, 193, 7, 0.04) !important;
            min-height: 460px;
          }
          .card-podium-first:hover {
            box-shadow: 0 0 35px rgba(255, 193, 7, 0.4) !important;
          }
          /* Estilo específico para el 2do Puesto (Plata/Cyan) */
          .card-podium-second {
            border: 1px solid rgba(0, 240, 255, 0.3) !important;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15) !important;
            min-height: 410px;
          }
          .card-podium-second:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3) !important;
            border-color: #00f0ff !important;
          }
          /* Estilo específico para el 3er Puesto (Bronce/Magenta) */
          .card-podium-third {
            border: 1px solid rgba(255, 0, 127, 0.2) !important;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.1) !important;
            min-height: 390px;
          }
          .card-podium-third:hover {
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.2) !important;
            border-color: #ff007f !important;
          }
          /* Estilos de las portadas */
          .podium-cover-wrap {
            width: 100%;
            max-width: 110px;
            aspect-ratio: 2 / 3;
            margin: 15px auto 10px auto;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
          }
          .podium-cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
          }
          .card-podium:hover .podium-cover-wrap img {
            transform: scale(1.06);
          }
          /* Marcadores flotantes de posición */
          .podium-rank-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-family: monospace;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            z-index: 5;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
          }
          .badge-first {
            background: #ffc107;
            color: #000;
            box-shadow: 0 0 10px #ffc107;
          }
          .badge-second {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 10px #00f0ff;
          }
          .badge-third {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 10px #ff007f;
          }
          /* Ajuste de alineación en computadoras */
          @media (min-width: 768px) {
            .podium-col-first {
              margin-bottom: 20px; /* Eleva la tarjeta sobre el suelo */
            }
          }
        </style>

        <h3 class="fw-bold mb-4 text-center text-md-start font-monospace text-glow-warning">
          <i class="bi bi-trophy-fill text-warning me-2"></i>[ EL_TOP_3_DE_MI_VIDA ]
        </h3>

        <!-- Fila con alineación al fondo para simular podio real en PC (align-items-md-end) -->
        <div class="row g-4 mb-5 justify-content-center align-items-md-end" id="contenedor-favoritos-podio">
          
          <div class="col-12 text-center text-neon-gold font-monospace py-5">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            [ SYNCING_PODIUM_SECTOR... ]
          </div>

        </div>

        <hr class="my-5" />

        <hr class="my-5" />

        <!-- ================= SECCIÓN: EL CLUB DE LAS 5 ESTRELLAS (HORIZONTAL FLUIDO) ================= -->
<div class="container my-5 font-monospace position-relative" style="z-index: 2;">
  
  <div class="d-flex justify-content-between align-items-center border-bottom border-warning border-opacity-25 pb-3 mb-4">
    <h3 class="fw-bold m-0 h5 text-uppercase tracking-wider text-glow-warning">
      <i class="bi bi-grid-3x3-gap-fill me-2"></i>[ HORIZONTAL_STREAM // DATA_CORES ]
    </h3>
    <span class="badge bg-dark-warning text-warning border border-warning border-opacity-25 py-2 px-3 small">
      AXIS: X_STREAM
    </span>
  </div>

  <div class="swiper mySwiperBooks py-4">
    <div class="swiper-wrapper" id="contenedor-favoritos-carrusel">
      
      <div class="swiper-slide text-center text-neon-gold font-monospace py-5 w-100">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        [ SYNCING_X_STREAM_SECTOR... ]
      </div>

    </div>
    
    <div class="swiper-pagination mt-4 position-relative"></div>
  </div>
</div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

      </main>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src='..theme-mode.js?v=20260701'></script>
</body>
</html>
