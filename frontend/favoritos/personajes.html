<!DOCTYPE html>
<html lang="es">
<head>

    .flip-card { perspective: 1000px; height: 540px !important; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s ease; transform-style: preserve-3d; }
    .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 0.75rem; overflow: hidden; }
    .flip-card-front { display: flex; flex-direction: column; height: 100%; }
    .flip-card-back { transform: rotateY(180deg); background: rgba(8, 5, 18, 0.96); display: flex; flex-direction: column; justify-content: space-between; padding: 1.5rem; }
    .flip-card-back h3, .flip-card-back h4 { text-shadow: 0 0 12px rgba(0, 240, 255, 0.35); }
    .flip-card-back p { color: #ddd; line-height: 1.7; }
    .flip-card .card-data-content { min-height: 220px; display: flex; flex-direction: column; justify-content: space-between; }
  </style>
</head>

<!-- Modal Secreto de Inyección de Personajes (Se abre con Ctrl + Shift + B) -->
<div class="modal fade" id="modal-nuevo-personaje" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border border-secondary border-opacity-50 text-white font-monospace bitacora-skin-modal">
      <div class="modal-header border-bottom border-secondary border-opacity-25 bg-black-25">
        <h5 class="modal-title text-neon-cyan font-orbitron">[ INJECT_PERSONAJE_RECORD ]</h5>
        <span id="personaje-admin-indicator" class="small fw-bold text-danger">[ ADMIN: OFF ]</span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="px-4 pt-3 pb-2 border-bottom border-secondary border-opacity-10 bg-black-25">
        <label class="form-label text-neon-magenta small">&gt; CÓDIGO_SISTEMA (PASSWORD)</label>
        <input type="password" id="modal-password-personaje" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="••••••••" required>
      </div>
      <div class="modal-body" style="max-height: 65vh; overflow-y: auto;">
        <form id="form-nuevo-personaje" class="p-2">
          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; ID_EDITAR (OPCIONAL)</label>
            <input type="text" id="personaje-id-editar" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="personaje-123... (si lo rellenas, edita)">
            <div id="personaje-edit-mode-badge" class="form-text small mt-1 text-warning d-none">[ MODO EDICION ACTIVO ]</div>
          </div>
          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; NOMBRE_DEL_PERSONAJE</label>
            <input type="text" id="personaje-nombre" class="form-control form-control-sm bg-black border-secondary text-white text-uppercase" placeholder="TONY MONTANA" required>
          </div>
          <div class="row mb-3">
            <div class="col-8">
              <label class="form-label text-neon-magenta small">&gt; COLOR_NOMBRE</label>
              <select id="personaje-color-nombre" class="form-select form-select-sm bg-black border-secondary text-white">

                <option value="cyan">CYAN (NEÓN)</option>
                <option value="magenta">MAGENTA (NEÓN)</option>
                <option value="green">GREEN (NEÓN)</option>
                <option value="yellow">YELLOW (NEÓN)</option>
                <option value="purple">PURPLE (NEÓN)</option>

              </select>
            </div>

            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; ORIGEN / ROL</label>
            <input type="text" id="personaje-origen" class="form-control form-control-sm bg-black border-secondary text-white text-uppercase" placeholder="SCARFACE / GÁNGSTER" required>
          </div>
          <div class="row mb-3">
            <div class="col-8">
              <label class="form-label text-neon-magenta small">&gt; COLOR_ORIGEN (SUBTÍTULO)</label>
              <select id="personaje-color-origen" class="form-select form-select-sm bg-black border-secondary text-white">
                <option value="cyan">CYAN (NEÓN)</option>
                <option value="magenta">MAGENTA (NEÓN)</option>
                <option value="green">GREEN (NEÓN)</option>
                <option value="yellow">YELLOW (NEÓN)</option>
                <option value="purple">PURPLE (NEÓN)</option>
                <option value="orange">ORANGE (NEÓN)</option>
              </select>
            </div>
            <div class="col-4 d-flex align-items-end">
              <div id="preview-color-origen" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-8">
              <label class="form-label text-neon-magenta small">&gt; COLOR_HUD_TAG (SUBJECT ID)</label>
              <select id="personaje-color-subjectid" class="form-select form-select-sm bg-black border-secondary text-white">
                <option value="cyan">CYAN (NEÓN)</option>
                <option value="magenta">MAGENTA (NEÓN)</option>
                <option value="green">GREEN (NEÓN)</option>
                <option value="yellow">YELLOW (NEÓN)</option>
                <option value="purple">PURPLE (NEÓN)</option>
                <option value="orange">ORANGE (NEÓN)</option>
              </select>
            </div>
            <div class="col-4 d-flex align-items-end">
              <div id="preview-color-subjectid" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; DESCRIPCIÓN</label>
            <textarea id="personaje-descripcion" class="form-control form-control-sm bg-black border-secondary text-white" rows="2" placeholder="Descripción del personaje..." required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; FICHA (resumen corto)</label>
            <textarea id="personaje-ficha" class="form-control form-control-sm bg-black border-secondary text-white" rows="2" placeholder="Ficha breve del personaje..." required></textarea>
          </div>
          <div class="row mb-3">
            <div class="col-8">
              <label class="form-label text-neon-magenta small">&gt; COLOR_CABECERA_FICHA</label>
              <select id="personaje-color-ficha" class="form-select form-select-sm bg-black border-secondary text-white">
                <option value="cyan">CYAN (NEÓN)</option>
                <option value="magenta">MAGENTA (NEÓN)</option>
                <option value="green">GREEN (NEÓN)</option>
                <option value="yellow">YELLOW (NEÓN)</option>
                <option value="purple">PURPLE (NEÓN)</option>
                <option value="orange">ORANGE (NEÓN)</option>
              </select>
            </div>
            <div class="col-4 d-flex align-items-end">
              <div id="preview-color-ficha" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; DATOS_CURIOSOS</label>
            <textarea id="personaje-curiosidades" class="form-control form-control-sm bg-black border-secondary text-white" rows="2" placeholder="Dato curioso, habilidad o secreto..."></textarea>
          </div>
          <div class="row mb-3">
            <div class="col-8">
              <label class="form-label text-neon-magenta small">&gt; COLOR_CABECERA_CURIOSIDADES</label>
              <select id="personaje-color-curiosidades" class="form-select form-select-sm bg-black border-secondary text-white">
                <option value="magenta">MAGENTA (NEÓN)</option>
                <option value="cyan">CYAN (NEÓN)</option>
                <option value="green">GREEN (NEÓN)</option>
                <option value="yellow">YELLOW (NEÓN)</option>
                <option value="purple">PURPLE (NEÓN)</option>
                <option value="orange">ORANGE (NEÓN)</option>
              </select>
            </div>
            <div class="col-4 d-flex align-items-end">
              <div id="preview-color-curiosidades" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(255,0,127,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; SUBIR_IMAGEN_LOCAL (IMG)</label>
            <input type="file" id="personaje-imagen-file" class="form-control form-control-sm bg-black border-secondary text-white" accept="image/*">
            <div class="form-text text-white small mt-1">// Opcional: selecciona un archivo de imagen local</div>
          </div>
          <div class="mb-3">
            <label class="form-label text-neon-magenta small">&gt; PATH_IMAGEN (MANUAL)</label>
            <input type="text" id="personaje-imagen" class="form-control form-control-sm bg-black border-secondary text-white" value="/assets/images/default.jpg">
          </div>
          <div class="d-flex gap-2 mt-2">
            <button type="button" class="btn btn-sm w-50 font-orbitron btn-deactivate-admin-modal btn-close-admin-mode bitacora-modal-btn bitacora-modal-btn-danger">[ CERRAR MODO ADMIN ]</button>
            <button type="submit" class="btn btn-sm w-50 font-orbitron bitacora-modal-btn">[ INJECT_PERSONAJE_RECORD ]</button>
          </div>

</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const personajeRow = document.getElementById('personajes-row');
      const btnOpenModal = document.getElementById('btn-open-modal-personaje');
      const ACCESS_CODE = 'bunker2026';
      const ADMIN_SESSION_KEY = 'bunker_admin_authenticated';
      let isAdmin = sessionStorage.getItem(ADMIN_SESSION_KEY) === '1';
      const personajeAdminIndicator = document.getElementById('personaje-admin-indicator');
      let lastPersonajeAdminState = isAdmin;

      function updatePersonajeAdminIndicator() {
        if (!personajeAdminIndicator) return;
        document.body.classList.toggle('admin-mode', isAdmin);
        personajeAdminIndicator.textContent = isAdmin ? '[ ADMIN: ON ]' : '[ ADMIN: OFF ]';
        personajeAdminIndicator.className = 'small fw-bold';
        personajeAdminIndicator.style.color = isAdmin ? '#4cffb2' : '#ff6f8f';
        personajeAdminIndicator.style.textShadow = isAdmin
          ? '0 0 8px rgba(76,255,178,0.65), 0 0 14px rgba(76,255,178,0.35)'
          : '0 0 8px rgba(255,111,143,0.6), 0 0 14px rgba(255,111,143,0.3)';
        personajeAdminIndicator.style.transition = 'color 0.22s ease, text-shadow 0.22s ease';

        if (isAdmin && !lastPersonajeAdminState && typeof personajeAdminIndicator.animate === 'function') {
          personajeAdminIndicator.animate(
            [
              { opacity: 0.35, transform: 'scale(0.96)' },
              { opacity: 1, transform: 'scale(1.08)' },
              { opacity: 1, transform: 'scale(1)' }
            ],
            { duration: 220, easing: 'ease-out' }
          );
        }

        lastPersonajeAdminState = isAdmin;
      }

      function activarModoAdmin() {
        sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
        isAdmin = true;
        const passInput = document.getElementById('modal-password-personaje');
        if (passInput) passInput.value = ACCESS_CODE;
        updatePersonajeAdminIndicator();
      }

      function desactivarModoAdmin() {
        sessionStorage.removeItem(ADMIN_SESSION_KEY);
        isAdmin = false;
        const passInput = document.getElementById('modal-password-personaje');
        if (passInput) passInput.value = '';
        updatePersonajeAdminIndicator();
        loadPersonajes();
      }

      function openPersonajeModal() {
        const modalEl = document.getElementById('modal-nuevo-personaje');
        if (!modalEl) return;
        const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
        modalInst.show();
        const passInput = document.getElementById('modal-password-personaje');
        if (passInput && isAdmin) passInput.value = ACCESS_CODE;
      }

      function requestAccessAndOpenPersonajeModal() {
        if (isAdmin) {
          openPersonajeModal();
          return;
        }

        const code = prompt('INGRESE CÓDIGO DE ACCESO DE SEGURIDAD:');
        if (code === ACCESS_CODE) {
          activarModoAdmin();
          openPersonajeModal();
          loadPersonajes();
        } else if (code !== null) {
          alert('CÓDIGO DE ACCESO INCORRECTO. ACCESO DENEGADO.');
        }
      }

      updatePersonajeAdminIndicator();

      const personajePasswordInput = document.getElementById('modal-password-personaje');
      if (personajePasswordInput) {
        personajePasswordInput.addEventListener('input', () => {
          if (personajePasswordInput.value === ACCESS_CODE && !isAdmin) {
            activarModoAdmin();
            loadPersonajes();
          }
        });
      }

      const SECRET_MODAL_EXTRA_COLORS = [
        { value: 'red', label: 'RED (POTENTE)' },
        { value: 'blue', label: 'BLUE (FUERTE)' },
        { value: 'gray', label: 'GRAY (LEGIBLE)' },
        { value: 'brown', label: 'BROWN (MARRON)' },
        { value: 'black', label: 'BLACK (NEGRO)' }
      ];

      function expandSecretModalColorOptions() {
        const modal = document.getElementById('modal-nuevo-personaje');
        if (!modal) return;
        const colorSelects = modal.querySelectorAll('select[id*="color"]');
        colorSelects.forEach((select) => {
          SECRET_MODAL_EXTRA_COLORS.forEach((opt) => {
            const exists = Array.from(select.options).some((o) => o.value === opt.value);
            if (!exists) {
              select.add(new Option(opt.label, opt.value));
            }
          });
        });
      }

      expandSecretModalColorOptions();

      function isHexColor(value) {
        return /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || '').trim());
      }

      function normalizeHex(value) {
        const raw = String(value || '').trim();
        if (!isHexColor(raw)) return '';
        if (raw.length === 4) {
          return `#${raw[1]}${raw[1]}${raw[2]}${raw[2]}${raw[3]}${raw[3]}`.toUpperCase();
        }
        return raw.toUpperCase();
      }

      function ensureCustomColorOption(select, hexValue) {
        const hex = normalizeHex(hexValue);
        if (!select || !hex) return;
        const existing = Array.from(select.options).find((o) => o.value.toUpperCase() === hex);
        if (!existing) {
          select.add(new Option(`CUSTOM (${hex})`, hex));
        }
      }

      function enhanceModalColorPickers() {
        const modal = document.getElementById('modal-nuevo-personaje');
        if (!modal) return;
        const colorSelects = modal.querySelectorAll('select[id*="color"]');
        colorSelects.forEach((select) => {
          if (select.dataset.paletteEnhanced === '1') return;
          select.dataset.paletteEnhanced = '1';

          if (isHexColor(select.value)) {
            ensureCustomColorOption(select, select.value);
          }

          const paletteBtn = document.createElement('button');
          paletteBtn.type = 'button';
          paletteBtn.className = 'btn btn-outline-light btn-sm mt-2 rounded-0 font-monospace';
          paletteBtn.style.fontSize = '0.65rem';
          paletteBtn.innerHTML = '[ 🎨 PALETA ] <span class="palette-swatch" aria-hidden="true" style="display:inline-block;width:11px;height:11px;margin-left:6px;border:1px solid rgba(255,255,255,0.65);vertical-align:middle;"></span>';

          const swatchEl = paletteBtn.querySelector('.palette-swatch');

          const resolveSwatchColor = (value) => {
            const key = String(value || '').trim().toLowerCase();
            if (isHexColor(key)) return normalizeHex(key);
            if (key === 'black' || key === 'brown') return '#FFFFFF';
            const quickMap = {
              white: '#FFFFFF',
              cyan: '#00F0FF',
              magenta: '#FF007F',
              green: '#3AFC13',
              yellow: '#FFEE00',
              purple: '#A072FF',
              orange: '#FF8C00',
              red: '#FF2B2B',
              blue: '#1F6FFF',
              gray: '#B8BCC6',
              dark: '#999999'
            };
            return quickMap[key] || '#00F0FF';
          };

          const syncSwatch = () => {
            if (!swatchEl) return;
            swatchEl.style.backgroundColor = resolveSwatchColor(select.value);
          };

          const nativePicker = document.createElement('input');
          nativePicker.type = 'color';
          nativePicker.className = 'd-none';
          nativePicker.value = '#00f0ff';

          paletteBtn.addEventListener('click', () => {
            const current = isHexColor(select.value) ? normalizeHex(select.value) : '#00f0ff';
            nativePicker.value = current;
            nativePicker.click();
          });

          nativePicker.addEventListener('input', () => {
            const picked = normalizeHex(nativePicker.value);
            if (!picked) return;
            ensureCustomColorOption(select, picked);
            select.value = picked;
            select.dispatchEvent(new Event('change', { bubbles: true }));
          });

          select.addEventListener('change', syncSwatch);
          syncSwatch();

          select.insertAdjacentElement('afterend', paletteBtn);
          paletteBtn.insertAdjacentElement('afterend', nativePicker);
        });
      }

      enhanceModalColorPickers();

      function syncPersonajeEditModeBadge() {
        const editInput = document.getElementById('personaje-id-editar');
        const badge = document.getElementById('personaje-edit-mode-badge');
        const form = document.getElementById('form-nuevo-personaje');
        const submitBtn = form ? form.querySelector('button[type="submit"]') : null;
        if (!editInput) return;

        const isEditMode = !!(editInput.value || '').trim();
        if (badge) {
          badge.classList.toggle('d-none', !isEditMode);
        }

        if (submitBtn) {
          if (!submitBtn.dataset.createLabel) {
            submitBtn.dataset.createLabel = '[ INJECT_PERSONAJE_RECORD ]';
          }
          submitBtn.textContent = isEditMode ? '[ GUARDAR CAMBIOS ]' : submitBtn.dataset.createLabel;
        }
      }

      const personajeEditInput = document.getElementById('personaje-id-editar');
      if (personajeEditInput) {
        personajeEditInput.addEventListener('input', syncPersonajeEditModeBadge);
        personajeEditInput.addEventListener('change', syncPersonajeEditModeBadge);
      }
      syncPersonajeEditModeBadge();

      // Color preview system for modal selectors
      const colorMap = {
        white: '#ffffff',
        cyan: '#00f0ff',
        magenta: '#ff007f',
        green: '#3afc13',
        yellow: '#ffee00',
        purple: '#a072ff',
        orange: '#ff8c00',
        red: '#ff2b2b',
        blue: '#1f6fff',
        gray: '#b8bcc6',
        brown: '#ffffff',
        black: '#ffffff',
        dark: '#999'
      };

      function getReadablePreviewColor(colorValue) {
        const value = String(colorValue || '').toLowerCase();
        if (isHexColor(value)) return normalizeHex(value);
        if (value === 'black' || value === 'brown') return '#ffffff';
        return colorMap[value] || '#ffffff';
      }

      function setupColorPreview(selectId, previewId) {
        const sel = document.getElementById(selectId);
        const prev = document.getElementById(previewId);
        if (!sel || !prev) return;
        const update = () => {
          const c = getReadablePreviewColor(sel.value);
          prev.style.color = c;
          prev.style.borderColor = c;
          prev.style.textShadow = `0 0 8px ${c}`;
        };
        sel.addEventListener('change', update);
        update();
      }

      setupColorPreview('personaje-color-nombre', 'preview-color-nombre');
      setupColorPreview('personaje-color-origen', 'preview-color-origen');
      setupColorPreview('personaje-color-subjectid', 'preview-color-subjectid');
      setupColorPreview('personaje-color-ficha', 'preview-color-ficha');
      setupColorPreview('personaje-color-curiosidades', 'preview-color-curiosidades');

      function createCharacterCard(personaje) {
        const nombre = personaje.nombre || 'Sin Nombre';
        const info = personaje.info || 'Sin información adicional';
        const ficha = personaje.ficha || personaje.info || 'Ficha no disponible.';
        const curiosidades = personaje.curiosidades || personaje.datosCuriosos || 'No hay datos curiosos registrados.';
        const cover = personaje.cover || '/assets/images/default.jpg';
        const subjectId = personaje.subjectId || '';

        // Dynamic styling selectors matching movies style
        const colorNombre = personaje.colorNombre || 'white';
        const nameClass = colorNombre === 'white' ? 'text-white' : `text-neon-${colorNombre}`;

        const colorOrigen = personaje.colorOrigen || personaje.colorInfo || personaje.color || 'cyan';
        const originClass = ['cyan','magenta','green','yellow','purple','orange','red','blue','gray','brown','black'].includes(colorOrigen)
          ? `text-neon-${colorOrigen}`
          : `text-${colorOrigen}`;

        const colorSubjectId = personaje.colorSubjectId || 'cyan';
        const subjectIdClass = `text-neon-${colorSubjectId}`;

        const colorFicha = personaje.colorFicha || 'cyan';
        const fichaClass = `text-neon-${colorFicha}`;

        const colorCuriosidades = personaje.colorCuriosidades || 'magenta';
        const curiosidadesClass = `text-neon-${colorCuriosidades}`;

        return `
          <div class="col-md-4">
            <div class="subject-profile-card flip-card h-100" data-subject-id="${personaje.id || ''}">
              <div class="flip-card-inner">
                <div class="flip-card-front">
                  <div class="position-relative overflow-hidden card-img-wrapper">
                    <div class="subject-hud-tag ${subjectIdClass}">${subjectId}</div>
                    <img src="${cover}" class="img-fluid subject-photo" alt="${nombre}">
                    <div class="subject-scan-line"></div>
                  </div>
                  <div class="p-4 card-data-content text-center">
                    <h3 class="h4 fw-black text-uppercase tracking-wide ${nameClass} mb-1 titulo-favorito">${nombre}</h3>
                    <span class="text-xs ${originClass} font-monospace d-block mb-3">${info}</span>
                    <button type="button" class="btn btn-subject-action text-uppercase fw-black w-100 rounded-0 btn-show-ficha">
                      Ver Ficha
                    </button>
                    ${isAdmin ? `<button type="button" class="btn btn-outline-info btn-sm rounded-0 text-uppercase font-monospace w-100 mt-2 btn-edit-personaje" data-id="${personaje.id || ''}" style="font-size: 0.68rem;">[ EDITAR ]</button><button type="button" class="btn btn-outline-danger btn-sm rounded-0 text-uppercase font-monospace w-100 mt-2 btn-delete-personaje" data-id="${personaje.id || ''}" style="font-size: 0.68rem;">[ ELIMINAR ]</button>` : ''}
                  </div>
                </div>
                <div class="flip-card-back">
                  <div>
                    <h3 class="h5 ${fichaClass} mb-3">FICHA</h3>
                    <p class="text-white mb-3">${ficha}</p>
                    <h4 class="${curiosidadesClass} mb-2">Datos curiosos</h4>
                    <p class="text-white mb-4">${curiosidades}</p>
                  </div>
                  <button type="button" class="btn btn-subject-action text-uppercase fw-black w-100 rounded-0 btn-close-ficha">
                    Cerrar Ficha
                  </button>
                </div>
              </div>
            </div>
          </div>`;
      }

      async function loadPersonajes() {
        if (!personajeRow) return;

        try {
          const response = await fetch('/api/personajes');
          if (!response.ok) throw new Error('No se pudo cargar los personajes');
          const personajes = await response.json();
          console.log('personajes cargados:', Array.isArray(personajes) ? personajes.length : typeof personajes);
          
          personajeRow.innerHTML = '';
          personajes.forEach(personaje => {
            personajeRow.insertAdjacentHTML('beforeend', createCharacterCard(personaje));
          });
        } catch (error) {
          console.error('Error cargando personajes:', error);
        }
      }

      function setCardFlip(card, flipped) {
        if (!card) return;
        card.classList.toggle('is-flipped', flipped);
      }

      async function eliminarPersonaje(id, password) {
        const response = await fetch('/api/personajes/eliminar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, password })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'FAIL_DELETION');
        }

        return response.json();
      }

      document.addEventListener('click', async (event) => {
        const editBtn = event.target.closest('.btn-edit-personaje');
        const deleteBtn = event.target.closest('.btn-delete-personaje');
        const showBtn = event.target.closest('.btn-show-ficha');
        const closeBtn = event.target.closest('.btn-close-ficha');

        if (editBtn && isAdmin) {
          event.preventDefault();
          const personajeId = editBtn.getAttribute('data-id');
          if (!personajeId) return;

          try {
            const response = await fetch('/api/personajes');
            if (!response.ok) throw new Error('No se pudo leer personajes');
            const personajes = await response.json();
            const personaje = personajes.find(item => item.id === personajeId);
            if (!personaje) throw new Error('Personaje no encontrado');

            const setVal = (id, value) => {
              const el = document.getElementById(id);
              if (el) el.value = value ?? '';
            };

            setVal('personaje-id-editar', personaje.id);
            syncPersonajeEditModeBadge();
            setVal('personaje-nombre', personaje.nombre || '');
            setVal('personaje-color-nombre', personaje.colorNombre || 'white');
            setVal('personaje-origen', personaje.info || '');
            setVal('personaje-color-origen', personaje.colorOrigen || personaje.colorInfo || personaje.color || 'cyan');
            setVal('personaje-color-subjectid', personaje.colorSubjectId || 'cyan');
            setVal('personaje-descripcion', personaje.descripcion || '');
            setVal('personaje-ficha', personaje.ficha || '');
            setVal('personaje-color-ficha', personaje.colorFicha || 'cyan');
            setVal('personaje-curiosidades', personaje.curiosidades || personaje.datosCuriosos || '');
            setVal('personaje-color-curiosidades', personaje.colorCuriosidades || 'magenta');
            setVal('personaje-imagen', personaje.cover || '');

            const modalEl = document.getElementById('modal-nuevo-personaje');
            if (modalEl) {
              bootstrap.Modal.getOrCreateInstance(modalEl).show();
            }
          } catch (error) {
            alert(`ERROR AL CARGAR PERSONAJE: ${error.message}`);
          }
          return;
        }

        if (deleteBtn && isAdmin) {
          event.preventDefault();
          const personajeId = deleteBtn.getAttribute('data-id');
          if (!personajeId) return;

          if (!confirm('¿Eliminar este personaje del registro?')) return;

          const code = prompt('INGRESE CÓDIGO DE ACCESO DE SEGURIDAD PARA ELIMINAR EL PERSONAJE:');
          if (code !== 'bunker2026') {
            if (code !== null) alert('CÓDIGO DE ACCESO INCORRECTO. ACCESO DENEGADO.');
            return;
          }

          try {
            await eliminarPersonaje(personajeId, code);
            loadPersonajes();
          } catch (error) {
            alert(`ERROR AL ELIMINAR: ${error.message}`);
          }
          return;
        }

        if (showBtn) {
          const card = showBtn.closest('.flip-card');
          setCardFlip(card, true);
          event.preventDefault();
        }

        if (closeBtn) {
          const card = closeBtn.closest('.flip-card');
          setCardFlip(card, false);
          event.preventDefault();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'b') {
          e.preventDefault();
          requestAccessAndOpenPersonajeModal();
        }
      });

      const formNuevoPersonaje = document.getElementById('form-nuevo-personaje');
      const btnCloseAdminPersonaje = document.querySelector('.btn-deactivate-admin-modal');
      if (btnCloseAdminPersonaje) {
        btnCloseAdminPersonaje.addEventListener('click', () => {
          desactivarModoAdmin();
          const modalEl = document.getElementById('modal-nuevo-personaje');
          if (modalEl) {
            const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
            modalInst.hide();
          }
        });
      }
      if (formNuevoPersonaje) {
        formNuevoPersonaje.addEventListener('submit', function (e) {
          e.preventDefault();

          const fileInput = document.getElementById('personaje-imagen-file');
          const file = fileInput ? fileInput.files[0] : null;

          const submitData = (coverData = null, fileName = null) => {
            const editId = (document.getElementById('personaje-id-editar')?.value || '').trim();
            const nombre = document.getElementById('personaje-nombre').value.trim();
            const info = document.getElementById('personaje-origen').value.trim();
            const descripcion = document.getElementById('personaje-descripcion').value.trim();
            const ficha = document.getElementById('personaje-ficha').value.trim();
            const curiosidades = document.getElementById('personaje-curiosidades').value.trim();
            
            const colorNombre = document.getElementById('personaje-color-nombre').value;
            const colorOrigen = document.getElementById('personaje-color-origen').value;
            const colorSubjectId = document.getElementById('personaje-color-subjectid').value;
            const colorFicha = document.getElementById('personaje-color-ficha').value;
            const colorCuriosidades = document.getElementById('personaje-color-curiosidades').value;
            const cover = document.getElementById('personaje-imagen').value.trim() || '/assets/images/default.jpg';

            const personajeData = {
              id: editId || undefined,
              nombre,
              info,
              descripcion,
              ficha,
              curiosidades,
              color: colorOrigen, // fallback for legacy compatibility
              colorNombre,
              colorOrigen,
              colorSubjectId,
              colorFicha,
              colorCuriosidades,
              cover,
              password: document.getElementById('modal-password-personaje').value.trim(),
              coverFileData: coverData,
              coverFileName: fileName
            };

            const endpoint = editId ? '/api/personajes/editar' : '/api/personajes/nuevo';

            fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(personajeData)
            })
              .then(res => {
                if (!res.ok) {
                  return res.json().then(err => { throw new Error(err.error || 'Http Error'); });
                }
                return res.json();
              })
              .then(data => {
                if (data.success) {
                  if (data.personaje) {
                    if (personajeRow) personajeRow.insertAdjacentHTML('beforeend', createCharacterCard(data.personaje));
                  } else {
                    loadPersonajes();
                  }
                  formNuevoPersonaje.reset();
                  const editInput = document.getElementById('personaje-id-editar');
                  if (editInput) editInput.value = '';
                  syncPersonajeEditModeBadge();
                  const modalEl = document.getElementById('modal-nuevo-personaje');
                  if (modalEl) {
                    const modalInst = bootstrap.Modal.getInstance(modalEl);
                    if (modalInst) modalInst.hide();
                  }
                }
              })
              .catch(error => {
                console.error('Error guardando personaje:', error);
                alert(`ERROR: ${error.message}`);
              });
          };

          if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
              submitData(event.target.result, file.name);
            };
            reader.onerror = function (error) {
              console.error('Error leyendo imagen:', error);
              alert('Error leyendo el archivo de imagen.');
            };
            reader.readAsDataURL(file);
          } else {
            submitData();
          }
        });
      }

      if (btnOpenModal) {
        btnOpenModal.addEventListener('click', () => {
          requestAccessAndOpenPersonajeModal();
        });
      }

      loadPersonajes();
    });
</script>

  <!-- Script de movimiento magnético/distorsión del fondo -->
  <script>
    document.addEventListener('mousemove', (e) => {
      // Calculamos el porcentaje de la posición del ratón en la pantalla
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      
      // Pasamos los datos directamente al body de CSS
      document.body.style.setProperty('--mouse-x', `${x}%`);
      document.body.style.setProperty('--mouse-y', `${y}%`);
    });
  </script>
