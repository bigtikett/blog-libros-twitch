    <style>
      /* --- 📺 SERIES CUSTOM PREMIUM EFFECTS --- */
      
      .series-cyber-card {
        background: rgba(13, 9, 24, 0.75) !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
        border-radius: 6px !important;
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        overflow: hidden;
        position: relative;
      }
      .series-cyber-card:hover {
        transform: translateY(-5px);
        background: rgba(22, 15, 38, 0.85) !important;
      }
      
      /* Bordes de acento neón interactivos */
      .series-accent-cyan { border-left: 4px solid #00f0ff !important; }
      .series-accent-cyan:hover { border-color: #00f0ff !important; box-shadow: 0 0 20px rgba(0, 240, 255, 0.15); }
      
      .series-accent-magenta { border-left: 4px solid #ff007f !important; }
      .series-accent-magenta:hover { border-color: #ff007f !important; box-shadow: 0 0 20px rgba(255, 0, 127, 0.15); }

      .series-accent-green { border-left: 4px solid #3afc13 !important; }
      .series-accent-green:hover { border-color: #3afc13 !important; box-shadow: 0 0 20px rgba(58, 252, 19, 0.15); }

      .series-accent-yellow { border-left: 4px solid #ffee00 !important; }
      .series-accent-yellow:hover { border-color: #ffee00 !important; box-shadow: 0 0 20px rgba(255, 238, 0, 0.15); }

      .series-accent-purple { border-left: 4px solid #a072ff !important; }
      .series-accent-purple:hover { border-color: #a072ff !important; box-shadow: 0 0 20px rgba(160, 114, 255, 0.15); }

      .series-accent-orange { border-left: 4px solid #ff8c00 !important; }
      .series-accent-orange:hover { border-color: #ff8c00 !important; box-shadow: 0 0 20px rgba(255, 140, 0, 0.15); }

      /* Badges bg-dark con colores dinámicos */
      .bg-dark-cyan { background-color: rgba(0, 240, 255, 0.15) !important; color: #00f0ff !important; }
      .bg-dark-magenta { background-color: rgba(255, 0, 127, 0.15) !important; color: #ff007f !important; }
      .bg-dark-green { background-color: rgba(58, 252, 19, 0.15) !important; color: #3afc13 !important; }
      .bg-dark-yellow { background-color: rgba(255, 238, 0, 0.15) !important; color: #ffee00 !important; }
      .bg-dark-purple { background-color: rgba(160, 114, 255, 0.15) !important; color: #a072ff !important; }
      .bg-dark-orange { background-color: rgba(255, 140, 0, 0.15) !important; color: #ff8c00 !important; }
      
      /* Contenedor más grande para pósteres verticales */
      .series-poster-container {
        width: 100%;
        max-width: 180px; /* Poster de mayor tamaño */
        aspect-ratio: 2 / 3;
        background: #000;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      @media (max-width: 575px) {
        .series-poster-container {
          max-width: 140px; /* Tamaño optimizado en móviles */
          margin-bottom: 5px;
        }
      }
 
      .series-poster-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .series-cyber-card:hover .series-poster-img {
        transform: scale(1.05);
      }
 
      /* Decrypted monitor overlay */
      .series-poster-container::before {
        content: '[ FEED_ONLINE ]';
        position: absolute;
        bottom: 6px;
        left: 6px;
        font-family: monospace;
        font-size: 8px;
        color: #39ff14;
        text-shadow: 0 0 3px #39ff14;
        background: rgba(0, 0, 0, 0.75);
        padding: 2px 5px;
        border-radius: 2px;
        z-index: 5;
        letter-spacing: 0.5px;
      }
      
      /* Línea de escaneo láser en hover */
      .series-poster-container::after {
        content: '';
        position: absolute;
        top: -100%;
        left: 0;
        width: 100%;
        height: 3px;
        background: rgba(0, 240, 255, 0.4);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        opacity: 0.35;
        pointer-events: none;
        z-index: 4;
      }
      .series-accent-cyan .series-poster-container::after {
        background: rgba(0, 240, 255, 0.4);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
      }
      .series-accent-magenta .series-poster-container::after {
        background: rgba(255, 0, 127, 0.4);
        box-shadow: 0 0 10px rgba(255, 0, 127, 0.6);
      }
      .series-accent-green .series-poster-container::after {
        background: rgba(58, 252, 19, 0.4);
        box-shadow: 0 0 10px rgba(58, 252, 19, 0.6);
      }
      .series-accent-yellow .series-poster-container::after {
        background: rgba(255, 238, 0, 0.4);
        box-shadow: 0 0 10px rgba(255, 238, 0, 0.6);
      }
      .series-accent-purple .series-poster-container::after {
        background: rgba(160, 114, 255, 0.4);
        box-shadow: 0 0 10px rgba(160, 114, 255, 0.6);
      }
      .series-accent-orange .series-poster-container::after {
        background: rgba(255, 140, 0, 0.4);
        box-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
      }
      
      .series-cyber-card:hover .series-poster-container::after {
        animation: series-scan 2s linear infinite;
      }
      
      @keyframes series-scan {
        0% { top: -10%; }
        100% { top: 110%; }
      }

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("contenedor-series");
      const btnOpenAdminSerie = document.getElementById("open-admin-panel-serie");
      const ACCESS_CODE = "bunker2026";
      const ADMIN_SESSION_KEY = "bunker_admin_authenticated";
      let isAdmin = sessionStorage.getItem(ADMIN_SESSION_KEY) === "1";
      const serieAdminIndicator = document.getElementById('serie-admin-indicator');
      let lastSerieAdminState = isAdmin;

      function updateSerieAdminIndicator() {
        if (!serieAdminIndicator) return;
        document.body.classList.toggle('admin-mode', isAdmin);
        serieAdminIndicator.textContent = isAdmin ? '[ ADMIN: ON ]' : '[ ADMIN: OFF ]';
        serieAdminIndicator.className = 'small fw-bold';
        serieAdminIndicator.style.color = isAdmin ? '#4cffb2' : '#ff6f8f';
        serieAdminIndicator.style.textShadow = isAdmin
          ? '0 0 8px rgba(76,255,178,0.65), 0 0 14px rgba(76,255,178,0.35)'
          : '0 0 8px rgba(255,111,143,0.6), 0 0 14px rgba(255,111,143,0.3)';
        serieAdminIndicator.style.transition = 'color 0.22s ease, text-shadow 0.22s ease';

        if (isAdmin && !lastSerieAdminState && typeof serieAdminIndicator.animate === 'function') {
          serieAdminIndicator.animate(
            [
              { opacity: 0.35, transform: 'scale(0.96)' },
              { opacity: 1, transform: 'scale(1.08)' },
              { opacity: 1, transform: 'scale(1)' }
            ],
            { duration: 220, easing: 'ease-out' }
          );
        }

        lastSerieAdminState = isAdmin;
      }

      function activarModoAdmin() {
        sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
        isAdmin = true;
        const passInput = document.getElementById("modal-password");
        if (passInput) passInput.value = ACCESS_CODE;
        updateSerieAdminIndicator();
      }

      function desactivarModoAdmin() {
        sessionStorage.removeItem(ADMIN_SESSION_KEY);
        isAdmin = false;
        const passInput = document.getElementById("modal-password");
        if (passInput) passInput.value = '';
        updateSerieAdminIndicator();
        cargarSeries();
      }

      function openSerieModal() {
        const modalEl = document.getElementById("modal-nueva-serie");
        if (!modalEl) return;
        const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
        modalInst.show();
        const passInput = document.getElementById("modal-password");
        if (passInput && isAdmin) passInput.value = ACCESS_CODE;
      }

      function requestAccessAndOpenSerieModal() {
        if (isAdmin) {
          openSerieModal();
          return;
        }

        const code = prompt("INGRESE CÓDIGO DE ACCESO DE SEGURIDAD:");
        if (code === ACCESS_CODE) {
          activarModoAdmin();
          openSerieModal();
          cargarSeries();
        } else if (code !== null) {
          alert("CÓDIGO DE ACCESO INCORRECTO. ACCESO DENEGADO.");
        }
      }

      updateSerieAdminIndicator();

      const seriePasswordInput = document.getElementById("modal-password");
      if (seriePasswordInput) {
        seriePasswordInput.addEventListener('input', () => {
          if (seriePasswordInput.value === ACCESS_CODE && !isAdmin) {
            activarModoAdmin();
            cargarSeries();
          }
        });
      }

      const SECRET_MODAL_EXTRA_COLORS = [
        { value: 'red', label: 'RED (POTENTE)' },
        { value: 'blue', label: 'BLUE (FUERTE)' },
        { value: 'gray', label: 'GRAY (LEGIBLE)' },
        { value: 'brown', label: 'BROWN (MARRON)' },
        { value: 'black', label: 'BLACK (NEGRO)' }
      ];

      function expandSecretModalColorOptions() {
        const modal = document.getElementById('modal-nueva-serie');
        if (!modal) return;
        const colorSelects = modal.querySelectorAll('select[id*="color"]');
        colorSelects.forEach((select) => {
          SECRET_MODAL_EXTRA_COLORS.forEach((opt) => {
            const exists = Array.from(select.options).some((o) => o.value === opt.value);
            if (!exists) {
              select.add(new Option(opt.label, opt.value));
            }
          });
        });
      }

      expandSecretModalColorOptions();

      function isHexColor(value) {
        return /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || '').trim());
      }

      function normalizeHex(value) {
        const raw = String(value || '').trim();
        if (!isHexColor(raw)) return '';
        if (raw.length === 4) {
          return `#${raw[1]}${raw[1]}${raw[2]}${raw[2]}${raw[3]}${raw[3]}`.toUpperCase();
        }
        return raw.toUpperCase();
      }

      function ensureCustomColorOption(select, hexValue) {
        const hex = normalizeHex(hexValue);
        if (!select || !hex) return;
        const existing = Array.from(select.options).find((o) => o.value.toUpperCase() === hex);
        if (!existing) {
          select.add(new Option(`CUSTOM (${hex})`, hex));
        }
      }

      function enhanceModalColorPickers() {
        const modal = document.getElementById('modal-nueva-serie');
        if (!modal) return;
        const colorSelects = modal.querySelectorAll('select[id*="color"]');
        colorSelects.forEach((select) => {
          if (select.dataset.paletteEnhanced === '1') return;
          select.dataset.paletteEnhanced = '1';

          if (isHexColor(select.value)) {
            ensureCustomColorOption(select, select.value);
          }

          const paletteBtn = document.createElement('button');
          paletteBtn.type = 'button';
          paletteBtn.className = 'btn btn-outline-light btn-sm mt-2 rounded-0 font-monospace';
          paletteBtn.style.fontSize = '0.65rem';
          paletteBtn.innerHTML = '[ 🎨 PALETA ] <span class="palette-swatch" aria-hidden="true" style="display:inline-block;width:11px;height:11px;margin-left:6px;border:1px solid rgba(255,255,255,0.65);vertical-align:middle;"></span>';

          const swatchEl = paletteBtn.querySelector('.palette-swatch');

          const resolveSwatchColor = (value) => {
            const key = String(value || '').trim().toLowerCase();
            if (isHexColor(key)) return normalizeHex(key);
            if (key === 'black' || key === 'brown') return '#FFFFFF';
            const quickMap = {
              white: '#FFFFFF',
              cyan: '#00F0FF',
              magenta: '#FF007F',
              green: '#3AFC13',
              yellow: '#FFEE00',
              purple: '#A072FF',
              orange: '#FF8C00',
              red: '#FF2B2B',
              blue: '#1F6FFF',
              gray: '#B8BCC6'
            };
            return quickMap[key] || '#00F0FF';
          };

          const syncSwatch = () => {
            if (!swatchEl) return;
            swatchEl.style.backgroundColor = resolveSwatchColor(select.value);
          };

          const nativePicker = document.createElement('input');
          nativePicker.type = 'color';
          nativePicker.className = 'd-none';
          nativePicker.value = '#00f0ff';

          paletteBtn.addEventListener('click', () => {
            const current = isHexColor(select.value) ? normalizeHex(select.value) : '#00f0ff';
            nativePicker.value = current;
            nativePicker.click();
          });

          nativePicker.addEventListener('input', () => {
            const picked = normalizeHex(nativePicker.value);
            if (!picked) return;
            ensureCustomColorOption(select, picked);
            select.value = picked;
            select.dispatchEvent(new Event('change', { bubbles: true }));
          });

          select.addEventListener('change', syncSwatch);
          syncSwatch();

          select.insertAdjacentElement('afterend', paletteBtn);
          paletteBtn.insertAdjacentElement('afterend', nativePicker);
        });
      }

      enhanceModalColorPickers();

      function syncSerieEditModeBadge() {
        const editInput = document.getElementById('serie-id-editar');
        const badge = document.getElementById('serie-edit-mode-badge');
        const form = document.getElementById('form-nueva-serie');
        const submitBtn = form ? form.querySelector('button[type="submit"]') : null;
        if (!editInput) return;

        const isEditMode = !!(editInput.value || '').trim();
        if (badge) {
          badge.classList.toggle('d-none', !isEditMode);
        }

        if (submitBtn) {
          if (!submitBtn.dataset.createLabel) {
            submitBtn.dataset.createLabel = '[ INJECT_SERIES_RECORD ]';
          }
          submitBtn.textContent = isEditMode ? '[ GUARDAR CAMBIOS ]' : submitBtn.dataset.createLabel;
        }
      }

      const serieEditInput = document.getElementById('serie-id-editar');
      if (serieEditInput) {
        serieEditInput.addEventListener('input', syncSerieEditModeBadge);
        serieEditInput.addEventListener('change', syncSerieEditModeBadge);
      }
      syncSerieEditModeBadge();

      // 1. Cargar series desde el backend
      async function cargarSeries() {
        try {
          const response = await fetch("/api/series");
          if (!response.ok) throw new Error("Error al obtener series");
          const series = await response.json();
          renderSeries(series);
        } catch (error) {
          console.error("Error cargando las series:", error);
        }
      }

      function renderSeries(seriesList) {
        if (!container) return;
        container.innerHTML = "";

        if (seriesList.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center font-monospace py-5 text-white-50">
              [ NO_SERIES_RECORDS_FOUND ]
            </div>`;
          return;
        }

        seriesList.forEach((serie) => {
          const accentColor = (serie.color || "cyan").toLowerCase();
          const accentClass = `series-accent-${accentColor}`;
          const badgeClass = `bg-dark-${accentColor}`;

          const colorTitulo = serie.colorTitulo || 'white';
          const titleClass = colorTitulo === 'white' ? 'text-white' : `text-neon-${colorTitulo}`;

          const colorPuntuacion = serie.colorPuntuacion || 'cyan';
          const scoreClass = `text-neon-${colorPuntuacion}`;

          const colorGenero = serie.colorGenero || 'cyan';
          const generoClass = `text-neon-${colorGenero}`;

          const colorResena = serie.colorResena || 'white';
          const resenaClass = colorResena === 'white' ? 'text-light-subtle' : `text-neon-${colorResena}`;

          const colorPersonajes = serie.colorPersonajes || 'yellow';
          const personajesClass = `text-neon-${colorPersonajes}`;

          const cardHTML = `
            <div class="col-lg-6">
              <div class="series-cyber-card ${accentClass} p-4 h-100 d-flex flex-sm-row flex-column gap-4 align-items-center">
                <div class="flex-shrink-0 series-poster-container">
                  <img src="${serie.cover || '/assets/images/arkane.jpeg'}" class="series-poster-img" alt="${serie.titulo} Poster">
                </div>
                <div class="w-100 d-flex flex-column justify-content-between h-100">
                  <div>
                    <div class="d-flex justify-content-between align-items-start">
                      <h3 class="h4 fw-black text-uppercase ${titleClass} m-0 titulo-favorito">${serie.titulo}</h3>
                      <div class="d-flex align-items-center gap-2">
                        <span class="badge ${badgeClass} text-xs font-monospace">⭐️ <span class="${scoreClass}">${serie.puntuacion || '10/10'}</span></span>
                        ${isAdmin ? `<button type="button" class="btn btn-outline-info btn-sm rounded-0 text-uppercase font-monospace btn-edit-serie" data-id="${serie.id}" style="font-size: 0.62rem; padding: 2px 6px;">[ EDITAR ]</button><button type="button" class="btn btn-outline-danger btn-sm rounded-0 text-uppercase font-monospace btn-delete-serie" data-id="${serie.id}" style="font-size: 0.62rem; padding: 2px 6px;">[ ELIMINAR ]</button>` : ''}
                      </div>
                    </div>
                    <span class="text-xs ${generoClass} d-block font-monospace mb-2 mt-1">GEN: ${serie.genero || 'ANIMACIÓN / CYBERPUNK'}</span>
                    <p class="small ${resenaClass} mb-3" style="line-height: 1.5; font-size: 13px;">
                      ${serie.resena || ''}
                    </p>
                  </div>
                  <div class="border-top border-purple-gaming pt-2 mt-auto">
                    <span class="text-xs ${personajesClass} font-monospace d-block">PERSONAJES TOP: <strong class="text-white">${serie.personajesTop || ''}</strong></span>
                  </div>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += cardHTML;
        });
      }

      // 2. Keyboard shortcut handler Ctrl + Shift + B
      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "b") {
          e.preventDefault();
          requestAccessAndOpenSerieModal();
        }
      });

      if (btnOpenAdminSerie) {
        btnOpenAdminSerie.addEventListener("click", () => {
          requestAccessAndOpenSerieModal();
        });
      }

      async function eliminarSerie(id, password) {
        const response = await fetch('/api/series/eliminar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, password })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'FAIL_DELETION');
        }

        return response.json();
      }

      document.addEventListener('click', async (event) => {
        const editBtn = event.target.closest('.btn-edit-serie');
        const deleteBtn = event.target.closest('.btn-delete-serie');

        if (editBtn && isAdmin) {
          event.preventDefault();
          const serieId = editBtn.getAttribute('data-id');
          if (!serieId) return;

          try {
            const response = await fetch('/api/series');
            if (!response.ok) throw new Error('No se pudo leer series');
            const series = await response.json();
            const serie = series.find(item => item.id === serieId);
            if (!serie) throw new Error('Serie no encontrada');

            const setVal = (id, value) => {
              const el = document.getElementById(id);
              if (el) el.value = value ?? '';
            };

            setVal('serie-id-editar', serie.id);
            syncSerieEditModeBadge();
            setVal('serie-titulo', serie.titulo || '');
            setVal('serie-color-titulo', serie.colorTitulo || 'white');
            setVal('serie-puntuacion', serie.puntuacion || '');
            setVal('serie-color-puntuacion', serie.colorPuntuacion || 'cyan');
            setVal('serie-genero', serie.genero || '');
            setVal('serie-color-genero', serie.colorGenero || 'cyan');
            setVal('serie-resena', serie.resena || '');
            setVal('serie-color-resena', serie.colorResena || 'white');
            setVal('serie-personajes-top', serie.personajesTop || '');
            setVal('serie-color-personajes', serie.colorPersonajes || 'yellow');
            setVal('serie-color', serie.color || 'cyan');
            setVal('serie-cover', serie.cover || '');

            const modalEl = document.getElementById('modal-nueva-serie');
            if (modalEl) {
              const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
              modalInst.show();
            }
          } catch (error) {
            alert(`ERROR AL CARGAR SERIE: ${error.message}`);
          }
          return;
        }

        if (!deleteBtn || !isAdmin) return;

        const serieId = deleteBtn.getAttribute('data-id');
        if (!serieId) return;

        if (!confirm('¿Eliminar esta serie del registro?')) return;

        const code = prompt('INGRESE CÓDIGO DE ACCESO DE SEGURIDAD PARA ELIMINAR LA SERIE:');
        if (code !== 'bunker2026') {
          if (code !== null) alert('CÓDIGO DE ACCESO INCORRECTO. ACCESO DENEGADO.');
          return;
        }

        try {
          await eliminarSerie(serieId, code);
          cargarSeries();
        } catch (error) {
          alert(`ERROR AL ELIMINAR: ${error.message}`);
        }
      });

      // 3. Form submit handler
      const formNuevaSerie = document.getElementById("form-nueva-serie");
      const btnCloseAdminSerie = document.querySelector('.btn-deactivate-admin-modal');
      if (btnCloseAdminSerie) {
        btnCloseAdminSerie.addEventListener('click', () => {
          desactivarModoAdmin();
          const modalEl = document.getElementById("modal-nueva-serie");
          if (modalEl) {
            const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
            modalInst.hide();
          }
        });
      }
      if (formNuevaSerie) {
        formNuevaSerie.addEventListener("submit", function (e) {
          e.preventDefault();

          const fileInput = document.getElementById("serie-cover-file");
          const file = fileInput ? fileInput.files[0] : null;

          const submitData = (coverData = null, fileName = null) => {
            const editId = (document.getElementById('serie-id-editar')?.value || '').trim();
            const datosSerie = {
              id: editId || undefined,
              titulo: document.getElementById("serie-titulo").value.toUpperCase(),
              colorTitulo: document.getElementById("serie-color-titulo") ? document.getElementById("serie-color-titulo").value : "white",
              puntuacion: document.getElementById("serie-puntuacion").value,
              colorPuntuacion: document.getElementById("serie-color-puntuacion") ? document.getElementById("serie-color-puntuacion").value : "cyan",
              genero: document.getElementById("serie-genero").value.toUpperCase(),
              colorGenero: document.getElementById("serie-color-genero") ? document.getElementById("serie-color-genero").value : "cyan",
              resena: document.getElementById("serie-resena").value,
              colorResena: document.getElementById("serie-color-resena") ? document.getElementById("serie-color-resena").value : "white",
              personajesTop: document.getElementById("serie-personajes-top").value,
              colorPersonajes: document.getElementById("serie-color-personajes") ? document.getElementById("serie-color-personajes").value : "yellow",
              color: document.getElementById("serie-color").value,
              cover: document.getElementById("serie-cover").value || "/assets/images/arkane.jpeg",
              password: document.getElementById("modal-password").value,
              coverFileData: coverData,
              coverFileName: fileName
            };

            const endpoint = editId ? '/api/series/editar' : '/api/series/nuevo';

            fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(datosSerie)
            })
              .then((res) => {
                if (!res.ok) {
                  return res.json().then(err => { throw new Error(err.error || "Http Error"); });
                }
                return res.json();
              })
              .then((data) => {
                if (data.success) {
                  console.log(`[SYS]: ${data.message}`);
                  formNuevaSerie.reset();
                  const editInput = document.getElementById('serie-id-editar');
                  if (editInput) editInput.value = '';
                  syncSerieEditModeBadge();
                  
                  const modalEl = document.getElementById("modal-nueva-serie");
                  if (modalEl) {
                    const modalInst = bootstrap.Modal.getInstance(modalEl);
                    if (modalInst) modalInst.hide();
                  }

                  cargarSeries();
                }
              })
              .catch((err) => {
                console.error("Error adding series:", err);
                alert(`ERROR: ${err.message}`);
              });
          };

          if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
              submitData(event.target.result, file.name);
            };
            reader.onerror = function (error) {
              console.error("Error reading file:", error);
              alert("Error leyendo el archivo de imagen.");
            };
            reader.readAsDataURL(file);
          } else {
            submitData();
          }
        });
      }

      // Color preview system for modal selectors
      const colorMap = {
        white: '#ffffff',
        cyan: '#00f0ff',
        magenta: '#ff007f',
        green: '#3afc13',
        yellow: '#ffee00',
        purple: '#a072ff',
        orange: '#ff8c00',
        red: '#ff2b2b',
        blue: '#1f6fff',
        gray: '#b8bcc6',
        brown: '#ffffff',
        black: '#ffffff'
      };

      function getReadablePreviewColor(colorValue) {
        const value = String(colorValue || '').toLowerCase();
        if (isHexColor(value)) return normalizeHex(value);
        if (value === 'black' || value === 'brown') return '#ffffff';
        return colorMap[value] || '#ffffff';
      }

      function setupColorPreview(selectId, previewId) {
        const sel = document.getElementById(selectId);
        const prev = document.getElementById(previewId);
        if (!sel || !prev) return;
        const update = () => {
          const c = getReadablePreviewColor(sel.value);
          prev.style.color = c;
          prev.style.borderColor = c;
          prev.style.textShadow = `0 0 8px ${c}`;
        };
        sel.addEventListener('change', update);
        update();
      }

      setupColorPreview('serie-color-titulo', 'preview-serie-color-titulo');
      setupColorPreview('serie-color-puntuacion', 'preview-serie-color-puntuacion');
      setupColorPreview('serie-color-genero', 'preview-serie-color-genero');
      setupColorPreview('serie-color-resena', 'preview-serie-color-resena');
      setupColorPreview('serie-color-personajes', 'preview-serie-color-personajes');
      setupColorPreview('serie-color', 'preview-serie-color');

      // Cargar series al iniciar
      cargarSeries();
    });
  </script>
  <script src='..theme-mode.js?v=20260701'></script>
</body>
