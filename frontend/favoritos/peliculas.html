<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Búnker Archive // Películas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body class="movies-cinema-section min-vh-100">

  <button type="button" id="open-admin-panel-pelicula" class="fav-admin-trigger"><i class="bi bi-shield-lock"></i> Panel admin</button>

  <div class="movies-nav py-4">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="/index.html#favoritos-footer" class="btn btn-cinema-back rounded-0 btn-sm text-uppercase fw-black px-4">
        <i class="bi bi-arrow-left"></i> Volver
      </a>

  <section class="movies-hero py-5 text-center position-relative overflow-hidden">
    <div class="hero-content position-relative z-2">
      <h1 class="display-2 fw-black text-uppercase tracking-tighter mb-3">
        <span class="text-neon-cyan">🎬</span> CINEMA <span class="text-neon-purple">ARCHIVE</span>
      </h1>
      <p class="text-neon-green fs-5 tracking-wide mb-0">[ DECRYPTING CINEMATIC EXPERIENCES ]</p>
      <p class="text-white large mt-2">Historias que trascienden pantallas, direcciones que me hipnotizaron</p>
    </div>
  </section>

<div id="detalle-favorito">
  <div class="container-fluid px-4 px-lg-5 py-5">

    <div class="movies-grid" id="contenedor-peliculas">

      

    </div>

    <!-- Modal Secreto de Inyección de Películas (Se abre con Ctrl + Shift + B) -->
    <div class="modal fade" id="modal-nueva-pelicula" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark border border-secondary border-opacity-50 text-white font-monospace bitacora-skin-modal">
          <div class="modal-header border-bottom border-secondary border-opacity-25 bg-black-25">
            <h5 class="modal-title text-neon-cyan font-orbitron">[ INJECT_PELICULA_RECORD ]</h5>
            <span id="pelicula-admin-indicator" class="small fw-bold text-danger">[ ADMIN: OFF ]</span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="px-4 pt-3 pb-2 border-bottom border-secondary border-opacity-10 bg-black-25">
            <label class="form-label text-neon-magenta small">&gt; CÓDIGO_SISTEMA (PASSWORD)</label>
            <input type="password" id="modal-password-pelicula" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="••••••••" required>
          </div>
          <div class="modal-body" style="max-height: 65vh; overflow-y: auto;">
            <form id="form-nueva-pelicula" class="p-2">
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; ID_EDITAR (OPCIONAL)</label>
                <input type="text" id="pelicula-id-editar" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="pelicula-123... (si lo rellenas, edita)">
                <div id="pelicula-edit-mode-badge" class="form-text small mt-1 text-warning d-none">[ MODO EDICION ACTIVO ]</div>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; TITULO_DE_LA_PELICULA</label>
                <input type="text" id="pelicula-titulo" class="form-control form-control-sm bg-black border-secondary text-white text-uppercase" placeholder="INCEPTION" required>
              </div>
              <div class="row mb-3">
                <div class="col-8">
                  <label class="form-label text-neon-magenta small">&gt; COLOR_TITULO</label>
                  <select id="pelicula-color-titulo" class="form-select form-select-sm bg-black border-secondary text-white">
                    <option value="cyan">CYAN (NEÓN)</option>
                    <option value="magenta">MAGENTA (NEÓN)</option>
                    <option value="green">GREEN (NEÓN)</option>
                    <option value="yellow">YELLOW (NEÓN)</option>
                    <option value="purple">PURPLE (NEÓN)</option>
                    <option value="orange">ORANGE (NEÓN)</option>
                  </select>
                </div>
                <div class="col-4 d-flex align-items-end">
                  <div id="preview-color-titulo" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; PUNTUACION (e.g. 10/10 o 9.5/10)</label>
                <input type="text" id="pelicula-puntuacion" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="10/10" required>
              </div>
              <div class="row mb-3">
                <div class="col-8">
                  <label class="form-label text-neon-magenta small">&gt; COLOR_PUNTUACIÓN</label>
                  <select id="pelicula-color-puntuacion" class="form-select form-select-sm bg-black border-secondary text-white">
                    <option value="cyan">CYAN (NEÓN)</option>
                    <option value="magenta">MAGENTA (NEÓN)</option>
                    <option value="green">GREEN (NEÓN)</option>
                    <option value="yellow">YELLOW (NEÓN)</option>
                    <option value="purple">PURPLE (NEÓN)</option>
                    <option value="orange">ORANGE (NEÓN)</option>
                  </select>
                </div>
                <div class="col-4 d-flex align-items-end">
                  <div id="preview-color-puntuacion" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; DIRECTOR / AÑO</label>
                <input type="text" id="pelicula-director" class="form-control form-control-sm bg-black border-secondary text-white text-uppercase" placeholder="DIR: Christopher Nolan | AÑO: 2010" required>
              </div>
              <div class="row mb-3">
                <div class="col-8">
                  <label class="form-label text-neon-magenta small">&gt; COLOR_DIRECTOR</label>
                  <select id="pelicula-color-director" class="form-select form-select-sm bg-black border-secondary text-white">
                    <option value="cyan">CYAN (NEÓN)</option>
                    <option value="magenta">MAGENTA (NEÓN)</option>
                    <option value="green">GREEN (NEÓN)</option>
                    <option value="yellow">YELLOW (NEÓN)</option>
                    <option value="purple">PURPLE (NEÓN)</option>
                    <option value="orange">ORANGE (NEÓN)</option>
                  </select>
                </div>
                <div class="col-4 d-flex align-items-end">
                  <div id="preview-color-director" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">PREVIEW</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; RESEÑA / VALORACIÓN</label>
                <textarea id="pelicula-resena" class="form-control form-control-sm bg-black border-secondary text-white" rows="3" placeholder="Una trama compleja sobre el sueño dentro del sueño..." required></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; TAGS (separados por comas)</label>
                <input type="text" id="pelicula-tags" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="Sci-Fi, Thriller, Drama">
              </div>
              <div class="row mb-3">
                <div class="col-8">
                  <label class="form-label text-neon-magenta small">&gt; COLOR_TAGS (paleta inicial; cada tag rotará un color único)</label>
                  <select id="pelicula-color-tags" class="form-select form-select-sm bg-black border-secondary text-white">
                    <option value="cyan">CYAN</option>
                    <option value="purple">PURPLE</option>
                    <option value="magenta">MAGENTA</option>
                    <option value="yellow">YELLOW</option>
                    <option value="green">GREEN</option>
                    <option value="orange">ORANGE</option>
                    <option value="dark">DARK</option>
                    <option value="black">BLACK</option>
                  </select>
                </div>
                <div class="col-4 d-flex align-items-end">
                  <div id="preview-color-tags" class="w-100 text-center py-1 rounded" style="border:1px solid rgba(0,240,255,0.3); font-size:0.7rem; font-weight:700;">TAG</div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; OVERLAY_DESC (texto en hover del póster)</label>
                <input type="text" id="pelicula-overlay-desc" class="form-control form-control-sm bg-black border-secondary text-white" placeholder="Sueños dentro de sueños">
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; SUBIR_POSTER_LOCAL (IMG)</label>
                <input type="file" id="pelicula-cover-file" class="form-control form-control-sm bg-black border-secondary text-white" accept="image/*">
                <div class="form-text text-white small mt-1">// Opcional: selecciona un archivo de imagen local</div>
              </div>
              <div class="mb-3">
                <label class="form-label text-neon-magenta small">&gt; PATH_POSTER_IMG (MANUAL)</label>
                <input type="text" id="pelicula-cover" class="form-control form-control-sm bg-black border-secondary text-white" value="/assets/images/default.jpg">
              </div>
              <div class="d-flex gap-2 mt-2">
                <button type="button" class="btn btn-sm w-50 font-orbitron btn-deactivate-admin-modal btn-close-admin-mode bitacora-modal-btn bitacora-modal-btn-danger">[ CERRAR MODO ADMIN ]</button>
                <button type="submit" class="btn btn-sm w-50 font-orbitron bitacora-modal-btn">[ INJECT_PELICULA_RECORD ]</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Color preview system for modal selectors
      const ACCESS_CODE = 'bunker2026';
      const ADMIN_SESSION_KEY = 'bunker_admin_authenticated';
      const btnOpenAdminPelicula = document.getElementById('open-admin-panel-pelicula');
      let isAdmin = sessionStorage.getItem(ADMIN_SESSION_KEY) === '1';
      const peliculaAdminIndicator = document.getElementById('pelicula-admin-indicator');
      let lastPeliculaAdminState = isAdmin;

      function updatePeliculaAdminIndicator() {
        if (!peliculaAdminIndicator) return;
        document.body.classList.toggle('admin-mode', isAdmin);
        peliculaAdminIndicator.textContent = isAdmin ? '[ ADMIN: ON ]' : '[ ADMIN: OFF ]';
        peliculaAdminIndicator.className = 'small fw-bold';
        peliculaAdminIndicator.style.color = isAdmin ? '#4cffb2' : '#ff6f8f';
        peliculaAdminIndicator.style.textShadow = isAdmin
          ? '0 0 8px rgba(76,255,178,0.65), 0 0 14px rgba(76,255,178,0.35)'
          : '0 0 8px rgba(255,111,143,0.6), 0 0 14px rgba(255,111,143,0.3)';
        peliculaAdminIndicator.style.transition = 'color 0.22s ease, text-shadow 0.22s ease';

        if (isAdmin && !lastPeliculaAdminState && typeof peliculaAdminIndicator.animate === 'function') {
          peliculaAdminIndicator.animate(
            [
              { opacity: 0.35, transform: 'scale(0.96)' },
              { opacity: 1, transform: 'scale(1.08)' },
              { opacity: 1, transform: 'scale(1)' }
            ],
            { duration: 220, easing: 'ease-out' }
          );
        }

        lastPeliculaAdminState = isAdmin;
      }

      function activarModoAdmin() {
        sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
        isAdmin = true;
        const passInput = document.getElementById('modal-password-pelicula');
        if (passInput) passInput.value = ACCESS_CODE;
        updatePeliculaAdminIndicator();
      }

      function desactivarModoAdmin() {
        sessionStorage.removeItem(ADMIN_SESSION_KEY);
        isAdmin = false;
        const passInput = document.getElementById('modal-password-pelicula');
        if (passInput) passInput.value = '';
        updatePeliculaAdminIndicator();
        loadPeliculas();
      }

      function openPeliculaModal() {
        const modalEl = document.getElementById('modal-nueva-pelicula');
        if (!modalEl) return;
        const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
        modalInst.show();
        const passInput = document.getElementById('modal-password-pelicula');
        if (passInput && isAdmin) passInput.value = ACCESS_CODE;
      }

      function requestAccessAndOpenPeliculaModal() {
        if (isAdmin) {
          openPeliculaModal();
          return;
        }

        const code = prompt('INGRESE CÓDIGO DE ACCESO DE SEGURIDAD:');
        if (code === ACCESS_CODE) {
          activarModoAdmin();
          openPeliculaModal();
          loadPeliculas();
        } else if (code !== null) {
          alert('CÓDIGO DE ACCESO INCORRECTO. ACCESO DENEGADO.');
        }
      }

      updatePeliculaAdminIndicator();

      const peliculaPasswordInput = document.getElementById('modal-password-pelicula');
      if (peliculaPasswordInput) {
        peliculaPasswordInput.addEventListener('input', () => {
          if (peliculaPasswordInput.value === ACCESS_CODE && !isAdmin) {
            activarModoAdmin();
            loadPeliculas();
          }
        });
      }

      const SECRET_MODAL_EXTRA_COLORS = [
        { value: 'red', label: 'RED (POTENTE)' },
        { value: 'blue', label: 'BLUE (FUERTE)' },
        { value: 'gray', label: 'GRAY (LEGIBLE)' },
        { value: 'brown', label: 'BROWN (MARRON)' },
        { value: 'black', label: 'BLACK (NEGRO)' }
      ];

      function expandSecretModalColorOptions() {
        const modal = document.getElementById('modal-nueva-pelicula');
        if (!modal) return;
        const colorSelects = modal.querySelectorAll('select[id*="color"]');
        colorSelects.forEach((select) => {
          SECRET_MODAL_EXTRA_COLORS.forEach((opt) => {
            const exists = Array.from(select.options).some((o) => o.value === opt.value);
            if (!exists) {
              select.add(new Option(opt.label, opt.value));
            }
          });
        });
      }

      expandSecretModalColorOptions();

      function isHexColor(value) {
        return /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || '').trim());
      }

      function normalizeHex(value) {
        const raw = String(value || '').trim();
        if (!isHexColor(raw)) return '';
        if (raw.length === 4) {
          return `#${raw[1]}${raw[1]}${raw[2]}${raw[2]}${raw[3]}${raw[3]}`.toUpperCase();
        }
        return raw.toUpperCase();
      }

      function ensureCustomColorOption(select, hexValue) {
        const hex = normalizeHex(hexValue);
        if (!select || !hex) return;
        const existing = Array.from(select.options).find((o) => o.value.toUpperCase() === hex);
        if (!existing) {
          select.add(new Option(`CUSTOM (${hex})`, hex));
        }
      }

      function enhanceModalColorPickers() {
        const modal = document.getElementById('modal-nueva-pelicula');
        if (!modal) return;
        const colorSelects = modal.querySelectorAll('select[id*="color"]');
        colorSelects.forEach((select) => {
          if (select.dataset.paletteEnhanced === '1') return;
          select.dataset.paletteEnhanced = '1';

          if (isHexColor(select.value)) {
            ensureCustomColorOption(select, select.value);
          }

          const paletteBtn = document.createElement('button');
          paletteBtn.type = 'button';
          paletteBtn.className = 'btn btn-outline-light btn-sm mt-2 rounded-0 font-monospace';
          paletteBtn.style.fontSize = '0.65rem';
          paletteBtn.innerHTML = '[ 🎨 PALETA ] <span class="palette-swatch" aria-hidden="true" style="display:inline-block;width:11px;height:11px;margin-left:6px;border:1px solid rgba(255,255,255,0.65);vertical-align:middle;"></span>';

          const swatchEl = paletteBtn.querySelector('.palette-swatch');

          const resolveSwatchColor = (value) => {
            const key = String(value || '').trim().toLowerCase();
            if (isHexColor(key)) return normalizeHex(key);
            if (key === 'black' || key === 'brown') return '#FFFFFF';
            const quickMap = {
              cyan: '#00F0FF',
              magenta: '#FF007F',
              green: '#3AFC13',
              yellow: '#FFEE00',
              purple: '#A072FF',
              orange: '#FF8C00',
              red: '#FF2B2B',
              blue: '#1F6FFF',
              gray: '#B8BCC6',
              dark: '#999999'
            };
            return quickMap[key] || '#00F0FF';
          };

          const syncSwatch = () => {
            if (!swatchEl) return;
            swatchEl.style.backgroundColor = resolveSwatchColor(select.value);
          };

          const nativePicker = document.createElement('input');
          nativePicker.type = 'color';
          nativePicker.className = 'd-none';
          nativePicker.value = '#00f0ff';

          paletteBtn.addEventListener('click', () => {
            const current = isHexColor(select.value) ? normalizeHex(select.value) : '#00f0ff';
            nativePicker.value = current;
            nativePicker.click();
          });

          nativePicker.addEventListener('input', () => {
            const picked = normalizeHex(nativePicker.value);
            if (!picked) return;
            ensureCustomColorOption(select, picked);
            select.value = picked;
            select.dispatchEvent(new Event('change', { bubbles: true }));
          });

          select.addEventListener('change', syncSwatch);
          syncSwatch();

          select.insertAdjacentElement('afterend', paletteBtn);
          paletteBtn.insertAdjacentElement('afterend', nativePicker);
        });
      }

      enhanceModalColorPickers();

      function syncPeliculaEditModeBadge() {
        const editInput = document.getElementById('pelicula-id-editar');
        const badge = document.getElementById('pelicula-edit-mode-badge');
        const form = document.getElementById('form-nueva-pelicula');
        const submitBtn = form ? form.querySelector('button[type="submit"]') : null;
        if (!editInput) return;

        const isEditMode = !!(editInput.value || '').trim();
        if (badge) {
          badge.classList.toggle('d-none', !isEditMode);
        }

        if (submitBtn) {
          if (!submitBtn.dataset.createLabel) {
            submitBtn.dataset.createLabel = '[ INJECT_PELICULA_RECORD ]';
          }
          submitBtn.textContent = isEditMode ? '[ GUARDAR CAMBIOS ]' : submitBtn.dataset.createLabel;
        }
      }

      const peliculaEditInput = document.getElementById('pelicula-id-editar');
      if (peliculaEditInput) {
        peliculaEditInput.addEventListener('input', syncPeliculaEditModeBadge);
        peliculaEditInput.addEventListener('change', syncPeliculaEditModeBadge);
      }
      syncPeliculaEditModeBadge();

      const colorMap = {
        cyan: '#00f0ff', magenta: '#ff007f', green: '#3afc13',
        yellow: '#ffee00', purple: '#a072ff', orange: '#ff8c00',
        dark: '#999', black: '#ffffff', red: '#ff2b2b',
        blue: '#1f6fff', gray: '#b8bcc6', brown: '#ffffff'
      };

      function getReadablePreviewColor(colorValue) {
        const value = String(colorValue || '').toLowerCase();
        if (isHexColor(value)) return normalizeHex(value);
        if (value === 'black' || value === 'brown') return '#ffffff';
        return colorMap[value] || '#ffffff';
      }

      function setupColorPreview(selectId, previewId) {
        const sel = document.getElementById(selectId);
        const prev = document.getElementById(previewId);
        if (!sel || !prev) return;
        const update = () => {
          const c = getReadablePreviewColor(sel.value);
          prev.style.color = c;
          prev.style.borderColor = c;
          prev.style.textShadow = `0 0 8px ${c}`;
        };
        sel.addEventListener('change', update);
        update();
      }

      setupColorPreview('pelicula-color-titulo', 'preview-color-titulo');
      setupColorPreview('pelicula-color-puntuacion', 'preview-color-puntuacion');
      setupColorPreview('pelicula-color-director', 'preview-color-director');
      setupColorPreview('pelicula-color-tags', 'preview-color-tags');

      const tagPalette = ['cyan', 'purple', 'magenta', 'yellow', 'green', 'orange', 'red', 'blue', 'gray', 'brown', 'dark', 'black'];

      function parseTagItems(tagsValue, startColor) {
        const rawTags = String(tagsValue || '').split(',').map(t => t.trim()).filter(Boolean);
        const startIndex = tagPalette.indexOf(startColor) >= 0 ? tagPalette.indexOf(startColor) : 0;
        return rawTags.map((tag, index) => {
          const color = tagPalette[(startIndex + index) % tagPalette.length];
          return { label: tag, color };
        });
      }

      function renderMovieCard(movie) {
        const titulo = movie.titulo || movie.title || 'TÍTULO DESCONOCIDO';
        const puntuacion = movie.puntuacion || movie.rating || 'N/A';
        const director = movie.director || 'DESCONOCIDO';
        const anio = movie.anio || movie.year || '';
        const resena = movie.resena || movie.review || '';
        const overlayDesc = movie.overlayDesc || titulo;
        const cover = movie.cover || '/assets/images/default.jpg';
        const colorTitulo = movie.colorTitulo || movie.color || 'cyan';
        const colorPuntuacion = movie.colorPuntuacion || 'cyan';
        const colorDirector = movie.colorDirector || 'cyan';
        const tags = movie.tags || [];

        let tagsHtml = '';
        if (Array.isArray(tags)) {
          tagsHtml = tags.map(tag => {
            if (typeof tag === 'object' && tag.label) {
              return `<span class="tag tag-${tag.color || 'cyan'}">${tag.label}</span>`;
            }
            const label = String(tag).trim();
            return label ? `<span class="tag tag-cyan">${label}</span>` : '';
          }).join('');
        } else {
          tagsHtml = parseTagItems(tags, movie.colorTags || 'cyan')
            .map(tag => `<span class="tag tag-${tag.color}">${tag.label}</span>`)
            .join('');
        }

        const directorText = anio ? `DIR: ${director} | AÑO: ${anio}` : director;

        return `
          <div class="movie-card-container">
            <div class="movie-card">
              <div class="movie-poster-wrapper">
                <img src="${cover}" alt="${titulo}" class="movie-poster" />
                <div class="movie-overlay">
                  <div class="overlay-content">
                    <h3>${titulo}</h3>
                    <p>${overlayDesc}</p>
                  </div>
                </div>
              </div>
              <div class="movie-info">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <h4 class="text-neon-${colorTitulo} fw-black mb-0 titulo-favorito">${titulo}</h4>
                  <div class="d-flex align-items-center gap-2">
                    <span class="badge badge-cinema text-neon-${colorPuntuacion}">⭐ ${puntuacion}</span>
                    ${isAdmin ? `<button type="button" class="btn btn-outline-info btn-sm rounded-0 text-uppercase font-monospace btn-edit-pelicula" data-id="${movie.id || ''}" style="font-size: 0.62rem; padding: 2px 6px;">[ EDITAR ]</button><button type="button" class="btn btn-outline-danger btn-sm rounded-0 text-uppercase font-monospace btn-delete-pelicula" data-id="${movie.id || ''}" style="font-size: 0.62rem; padding: 2px 6px;">[ ELIMINAR ]</button>` : ''}
                  </div>
                </div>
                <p class="text-xs text-neon-${colorDirector} mb-2 font-monospace">${directorText}</p>
                <p class="text-white text-lg mb-2">${resena}</p>
                <div class="movie-tags">${tagsHtml}</div>
              </div>
            </div>
          </div>`;
      }

      async function loadPeliculas() {
        const container = document.getElementById('contenedor-peliculas');
        if (!container) return;

        try {
          const response = await fetch('/api/peliculas');
          if (!response.ok) throw new Error('No se pudo cargar la base de datos de películas');
          const peliculas = await response.json();

          container.innerHTML = '';
          peliculas.forEach(movie => {
            container.insertAdjacentHTML('beforeend', renderMovieCard(movie));
          });
        } catch (error) {
          console.warn('Error cargando películas:', error);
        }
      }

      loadPeliculas();

      async function eliminarPelicula(id, password) {
        const response = await fetch('/api/peliculas/eliminar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, password })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'FAIL_DELETION');
        }

        return response.json();
      }

      document.addEventListener('click', async (event) => {
        const editBtn = event.target.closest('.btn-edit-pelicula');
        const deleteBtn = event.target.closest('.btn-delete-pelicula');

        if (editBtn && isAdmin) {
          const peliculaId = editBtn.getAttribute('data-id');
          if (!peliculaId) return;

          try {
            const response = await fetch('/api/peliculas');
            if (!response.ok) throw new Error('No se pudo leer películas');
            const peliculas = await response.json();
            const movie = peliculas.find(item => item.id === peliculaId);
            if (!movie) throw new Error('Película no encontrada');

            const setVal = (id, value) => {
              const el = document.getElementById(id);
              if (el) el.value = value ?? '';
            };

            setVal('pelicula-id-editar', movie.id);
            syncPeliculaEditModeBadge();
            setVal('pelicula-titulo', movie.titulo || '');
            setVal('pelicula-color-titulo', movie.colorTitulo || movie.color || 'cyan');
            setVal('pelicula-puntuacion', movie.puntuacion || '');
            setVal('pelicula-color-puntuacion', movie.colorPuntuacion || 'cyan');
            const directorText = movie.director && movie.anio ? `DIR: ${movie.director} | AÑO: ${movie.anio}` : (movie.director || '');
            setVal('pelicula-director', directorText);
            setVal('pelicula-color-director', movie.colorDirector || 'cyan');
            setVal('pelicula-resena', movie.resena || '');
            const tagsValue = Array.isArray(movie.tags)
              ? movie.tags.map(tag => (typeof tag === 'object' ? tag.label : String(tag))).join(', ')
              : String(movie.tags || '');
            setVal('pelicula-tags', tagsValue);
            setVal('pelicula-color-tags', movie.colorTags || 'cyan');
            setVal('pelicula-overlay-desc', movie.overlayDesc || '');
            setVal('pelicula-cover', movie.cover || '');

            const modalEl = document.getElementById('modal-nueva-pelicula');
            if (modalEl) {
              bootstrap.Modal.getOrCreateInstance(modalEl).show();
            }
          } catch (error) {
            alert(`ERROR AL CARGAR PELÍCULA: ${error.message}`);
          }
          return;
        }

        if (!deleteBtn || !isAdmin) return;

        const peliculaId = deleteBtn.getAttribute('data-id');
        if (!peliculaId) return;

        if (!confirm('¿Eliminar esta película del registro?')) return;

        const code = prompt('INGRESE CÓDIGO DE ACCESO DE SEGURIDAD PARA ELIMINAR LA PELÍCULA:');
        if (code !== 'bunker2026') {
          if (code !== null) alert('CÓDIGO DE ACCESO INCORRECTO. ACCESO DENEGADO.');
          return;
        }

        try {
          await eliminarPelicula(peliculaId, code);
          loadPeliculas();
        } catch (error) {
          alert(`ERROR AL ELIMINAR: ${error.message}`);
        }
      });

      // Shortcut to open modal (Ctrl+Shift+B)
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'b') {
          e.preventDefault();
          requestAccessAndOpenPeliculaModal();
        }
      });

      if (btnOpenAdminPelicula) {
        btnOpenAdminPelicula.addEventListener('click', () => {
          requestAccessAndOpenPeliculaModal();
        });
      }

      // Form submit handler – saves to peliculas.json via API and injects card locally
      const formNuevaPelicula = document.getElementById('form-nueva-pelicula');
      const btnCloseAdminPelicula = document.querySelector('.btn-deactivate-admin-modal');
      if (btnCloseAdminPelicula) {
        btnCloseAdminPelicula.addEventListener('click', () => {
          desactivarModoAdmin();
          const modalEl = document.getElementById('modal-nueva-pelicula');
          if (modalEl) {
            const modalInst = bootstrap.Modal.getOrCreateInstance(modalEl);
            modalInst.hide();
          }
        });
      }
      if (formNuevaPelicula) {
        formNuevaPelicula.addEventListener('submit', function (e) {
          e.preventDefault();

          const fileInput = document.getElementById('pelicula-cover-file');
          const file = fileInput ? fileInput.files[0] : null;

          const submitData = (coverData = null, fileName = null) => {
            const editId = (document.getElementById('pelicula-id-editar')?.value || '').trim();
            const titulo = document.getElementById('pelicula-titulo').value.trim().toUpperCase();
            const puntuacion = document.getElementById('pelicula-puntuacion').value.trim();
            const directorRaw = document.getElementById('pelicula-director').value.trim();
            const resena = document.getElementById('pelicula-resena').value.trim();
            const tagsValue = document.getElementById('pelicula-tags').value.trim();
            const colorTitulo = document.getElementById('pelicula-color-titulo').value;
            const colorPuntuacion = document.getElementById('pelicula-color-puntuacion').value;
            const colorDirector = document.getElementById('pelicula-color-director').value;
            const colorTags = document.getElementById('pelicula-color-tags').value;
            const overlayDesc = document.getElementById('pelicula-overlay-desc').value.trim();
            const cover = document.getElementById('pelicula-cover').value.trim() || '/assets/images/default.jpg';

            const parsedTags = parseTagItems(tagsValue, colorTags);
            const datosPelicula = {
              id: editId || undefined,
              titulo,
              puntuacion,
              director: directorRaw.replace(/^DIR:\s*/i, '').split('|')[0].trim(),
              anio: (directorRaw.match(/AÑO:\s*(\d{4})/i) || directorRaw.match(/(\d{4})/) || ['', ''])[1],
              resena,
              tags: parsedTags,
              overlayTitle: titulo,
              overlayDesc: overlayDesc || titulo,
              cover,
              color: colorTitulo,
              colorTitulo,
              colorPuntuacion,
              colorDirector,
              colorTags,
              password: document.getElementById('modal-password-pelicula').value,
              coverFileData: coverData,
              coverFileName: fileName
            };

            const endpoint = editId ? '/api/peliculas/editar' : '/api/peliculas/nuevo';

            fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(datosPelicula)
            })
              .then(res => {
                if (!res.ok) {
                  return res.json().then(err => { throw new Error(err.error || 'Http Error'); });
                }
                return res.json();
              })
              .then(data => {
                if (data.success) {
                  console.log(`[SYS]: ${data.message}`);
                  if (data.movie) {
                    const container = document.getElementById('contenedor-peliculas');
                    if (container) container.insertAdjacentHTML('beforeend', renderMovieCard(data.movie));
                  } else {
                    loadPeliculas();
                  }

                  formNuevaPelicula.reset();
                  const editInput = document.getElementById('pelicula-id-editar');
                  if (editInput) editInput.value = '';
                  syncPeliculaEditModeBadge();
                  const modalEl = document.getElementById('modal-nueva-pelicula');
                  if (modalEl) {
                    const modalInst = bootstrap.Modal.getInstance(modalEl);
                    if (modalInst) modalInst.hide();
                  }
                }
              })
              .catch(err => {
                console.error('Error adding movie:', err);
                alert(`ERROR: ${err.message}`);
              });
          };

          if (file) {
            const reader = new FileReader();
            reader.onload = function (event) {
              submitData(event.target.result, file.name);
            };
            reader.onerror = function (error) {
              console.error('Error reading file:', error);
              alert('Error leyendo el archivo de imagen.');
            };
            reader.readAsDataURL(file);
          } else {
            submitData();
          }
        });
      }
    </script>

  </div>
  </div>
