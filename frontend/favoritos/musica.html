<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Búnker Archive // Audio Deck</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../style.min.css" />
  </head>
  <body class="body-terminal-cyber min-vh-100 py-5">
    <div class="container text-white">
      <div
        class="d-flex justify-content-between align-items-center border-bottom border-purple-gaming pb-3 mb-5"
      >
        <div>
          <span
            class="text-neon-purple fw-bold tracking-widest text-uppercase small"
            >[ DECK // AUDIO_FREQUENCY_MANAGER ]</span
          >
          <h1
            class="display-4 fw-black text-uppercase tracking-tight text-glow-purple m-0"
          >
            🎵 BACKGROUND BEATS
          </h1>
        </div>
        <a
          href="/index.html#favoritos-footer"
          class="btn btn-twitch-neon rounded-0 btn-sm text-uppercase fw-black px-3"
        >
          <i class="bi bi-arrow-left-short"></i> Volver al Búnker
        </a>
      </div>
        <div>
      <div class="row g-4">
        <div class="col-lg-5">
          <div
            id="fav-datapad-card"    class=" p-4 text-center d-flex flex-column justify-content-between"
          >
            <div>
              <span
                class="text-xs text-white font-monospace d-block text-start mb-3"
                >// HARDWARE_DECK_ACTIVE</span
              >

              <div
                class="cyber-tape-container mx-auto my-4 p-3 position-relative overflow-hidden"
                style="min-height: 200px; background: rgba(0, 0, 0, 0.4)"
              >
                <div
                  id="cassette-reels"
                  class="tape-reels d-flex justify-content-center gap-5 my-3"
                >
                  <div class="reel">
                    <i class="bi bi-gear-fill text-white animate-spin-slow"></i>
                  </div>
                  <div class="reel">
                    <i class="bi bi-gear-fill text-white animate-spin-slow"></i>
                  </div>
                </div>

                <video
                  id="real-video-player"
                  class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover d-none"
                  playsinline
                ></video>

                <div
                  id="deck-side"
                  class="tape-label text-xs fw-bold font-monospace text-dark bg-neon-purple p-1"
                  style="z-index: 2"
                >
                  SIDE A: DEEP_ZONE_04
                </div>
              </div>

              <h2
                id="deck-title"
                class="h4 fw-black text-uppercase text-neon-purple mb-1"
              >
                CYBER-GLITCH BEATS
              </h2>

              <p id="deck-status" class="text-xs text-white font-monospace">
                [ STREAMING // 44.1 KHZ // WITH BACKGROUND RAIN ]
              </p>

              <div class="my-4">
                <div
                  class="d-flex justify-content-between text-xs font-monospace text-white mb-1"
                >
                  <span id="opening">00:00</span>
                  <span id="ending">00:00</span>
                </div>
                <div
                  class="audio-progress-bar-container"
                  id="progress-container"
                >
                  <div id="progress" class="audio-progress-bar"></div>
                </div>
              </div>

              <div
                class="player-controls d-flex justify-content-center gap-3 align-items-center mt-2"
              >
                <button
                  id="player-prev-btn"
                  class="btn btn-link btn-sm p-0 "
                >
                  <i class="bi bi-skip-backward-fill"></i>
                </button>

                <button
                  id="player-play-btn"
                  class="btn btn-link btn-sm p-0 text-neon-purple"
                >
                  <i class="bi bi-play-circle-fill display-4"></i>
                </button>

                <button
                  id="player-next-btn"
                  class="btn btn-link btn-sm p-0 "
                >
                  <i class="bi bi-skip-forward-fill"></i>
                </button>

                <div
                  class="d-flex align-items-center gap-2 style-volume-container"
                >
                  <i
                    class="bi bi-volume-up-fill text-white"
                    id="volume-icon"
                    style="cursor: pointer"
                  ></i>
                  <div id="cyber-volume-container" class="position-relative">
                    <div id="cyber-volume-bg"></div>
                    <div id="cyber-volume-bar"></div>
                    <div id="cyber-volume-thumb"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="cyber-analyzer-container d-flex align-items-end justify-content-between p-2 my-3" id="visualizer-container">
  </div>
          </div>
        </div>
        
        <div class="col-lg-7">
          <div class="d-flex flex-column gap-3" id="playlist-selector"></div>
        </div>
      </div>
    </div>

    <audio id="real-audio-player"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

   <script>
  document.addEventListener("DOMContentLoaded", () => {
    // 1. SELECTORES DEL DOM FIJOS
    const deckTitle = document.getElementById("deck-title");
    const deckStatus = document.getElementById("deck-status");
    const deckSide = document.getElementById("deck-side");
    const playlistSelector = document.getElementById("playlist-selector");

    // 🎧 REPRODUCTORES (Dual Engine)
    const audioPlayer = document.getElementById("real-audio-player");
    const videoPlayer = document.getElementById("real-video-player");
    const cassetteReels = document.getElementById("cassette-reels");
    
    let activePlayer = audioPlayer; 

    // Botones de control
    const playBtn = document.getElementById("player-play-btn");
    const playIcon = playBtn.querySelector("i");
    const prevBtn = document.getElementById("player-prev-btn");
    const nextBtn = document.getElementById("player-next-btn");

    // Control de volumen custom
    const cyberVolumeContainer = document.getElementById("cyber-volume-container");
    const cyberVolumeBar = document.getElementById("cyber-volume-bar");
    const cyberVolumeThumb = document.getElementById("cyber-volume-thumb");
    const volumeIcon = document.getElementById("volume-icon");

    const timeOpening = document.getElementById("opening");
    const timeEnding = document.getElementById("ending");
    const progressBar = document.getElementById("progress");
    const progressContainer = document.getElementById("progress-container");

    // ========================================================
    // 📊 CONFIGURACIÓN DEL ECUALIZADOR (WEB AUDIO API)
    // ========================================================
    const visualizerContainer = document.getElementById("visualizer-container");
    const N_BARRAS = 32;

    if (visualizerContainer) {
      visualizerContainer.innerHTML = ""; 
      for (let i = 0; i < N_BARRAS; i++) {
        const bar = document.createElement("div");
        bar.className = "cyber-bar";
        visualizerContainer.appendChild(bar);
      }
    }
    const arrayBarras = Array.from(document.querySelectorAll(".cyber-bar"));

    // Variables de control de Audio Context
    let audioCtx = null;
    let analyser = null;
    let sourceAudio = null;
    let sourceVideo = null;
    let dataArray = null;

    const mapaAleatorio = [
      1, 14, 2, 25, 5, 18, 9, 30, 4, 12, 7, 22, 3, 16, 8, 27,
      11, 20, 6, 29, 13, 24, 10, 17, 15, 28, 0, 21, 19, 26, 23, 31
    ];

    if (!window.cassetteRotation) window.cassetteRotation = 0;
    let bucleActivo = false; 

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "00:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
    }

    // ========================================================
    // ⚙️ FUNCIONES DE CONTROL DEL DECK
    // ========================================================
    
    window.sincronizarDeck = function(songElem) {
      const type = songElem.getAttribute("data-type");
      const src = songElem.getAttribute("data-src");
      const currentVolume = activePlayer.volume;

      audioPlayer.pause();
      videoPlayer.pause();

      if (type === "video") {
        cassetteReels.classList.add("d-none");
        videoPlayer.classList.remove("d-none");
        activePlayer = videoPlayer;
      } else {
        cassetteReels.classList.remove("d-none");
        videoPlayer.classList.add("d-none");
        activePlayer = audioPlayer;
      }

      activePlayer.src = src;
      activePlayer.volume = currentVolume; 

      deckTitle.textContent = songElem.getAttribute("data-title");
      deckStatus.textContent = `[ ${songElem.getAttribute("data-status")} // 44.1 KHZ ]`;
      deckSide.textContent = songElem.getAttribute("data-side");
      
      const color = songElem.getAttribute("data-color");
      deckTitle.style.color = color;
      deckTitle.style.textShadow = `0 0 10px ${color}`;
      deckSide.style.backgroundColor = color;
      deckTitle.closest("#fav-datapad-card").style.borderColor = `${color}33`;
    }

    window.seleccionarCancion = function(songElem) {
      document.querySelectorAll(".song-item").forEach((s) => s.classList.remove("active-song"));
      document.querySelectorAll(".playlist-cartridge").forEach((c) => {
        c.classList.remove("active-track");
        const statusSpan = c.querySelector(".track-status");
        if (statusSpan) {
          statusSpan.textContent = "[ STANDBY ]";
          statusSpan.className = "track-status text-white";
          statusSpan.style.color = "";
        }
      });

      songElem.classList.add("active-song");
      
      const wrapper = songElem.closest(".playlist-cartridge-wrapper");
      const parentCartridge = wrapper.querySelector(".playlist-cartridge");
      parentCartridge.classList.add("active-track");

      const color = songElem.getAttribute("data-color");
      const parentStatus = parentCartridge.querySelector(".track-status");
      if (parentStatus) {
        parentStatus.textContent = "[ RUNNING ]";
        parentStatus.className = "track-status";
        parentStatus.style.color = color;
      }

      const colorActive = songElem.getAttribute("data-color");

      // ========================================================
      // 🖼️ SISTEMA DE CARÁTULAS
      // ========================================================
      const coverDirecta = songElem.getAttribute("data-cover");
      const srcCancion = songElem.getAttribute("data-src"); 
      const cassetteContainer = document.querySelector(".cyber-tape-container");

      if (cassetteContainer) {
        if (coverDirecta && coverDirecta !== "null" && coverDirecta !== "") {
          cassetteContainer.style.backgroundImage = `url('${coverDirecta}')`;
          cassetteContainer.style.backgroundSize = "cover";
          cassetteContainer.style.backgroundPosition = "center";
        } else {
          fetch(`/api/metadata?ruta=${encodeURIComponent(srcCancion)}`)
            .then(response => response.json())
            .then(data => {
              if (data && data.src) {
                cassetteContainer.style.backgroundImage = `url('${data.src}')`;
                cassetteContainer.style.backgroundSize = "cover";
                cassetteContainer.style.backgroundPosition = "center";
              }
            })
            .catch(err => {
              console.error("[SISTEMA] Fallo en la lectura del buffer de metadatos:", err);
              cassetteContainer.style.backgroundImage = "url('/img/default-cassette.jpg')"; 
            });
        }
      }

      setTimeout(() => {
        inicializarWebAudio();
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        sincronizarDeck(songElem);
        activePlayer.currentTime = 0; 
        
        const playPromise = activePlayer.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            playIcon.className = "bi bi-pause-circle-fill display-4";
            playIcon.style.color = colorActive;
          }).catch(error => {
            console.log("[SISTEMA] Terminal esperando directiva de interacción.");
          });
        }

        deckTitle.closest("#fav-datapad-card").style.opacity = "1";
      }, 250);
    }

    function inicializarWebAudio() {
      if (audioCtx) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return; 
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      sourceAudio = audioCtx.createMediaElementSource(audioPlayer);
      sourceVideo = audioCtx.createMediaElementSource(videoPlayer);

      sourceAudio.connect(analyser);
      sourceVideo.connect(analyser);
      analyser.connect(audioCtx.destination);

      if (!bucleActivo) {
        bucleActivo = true;
        renderizarSincronizacionRGB();
      }
    }

    function renderizarSincronizacionRGB() {
      if (!analyser) return;

      if (!activePlayer.paused) {
        analyser.getByteFrequencyData(dataArray);
        const promedioParaGiro = (dataArray[0] + dataArray[1] + dataArray[2]) / 3 || 0;
        const factorGiro = promedioParaGiro / 255;
        window.cassetteRotation += 0.6 + (factorGiro * 2.0);
      } else {
        if (dataArray) {
          for (let i = 0; i < dataArray.length; i++) {
            dataArray[i] = Math.max(0, dataArray[i] - 6);
          }
        }
      }

      let sumaGraves = 0;
      let recuentoGraves = 8;
      const activeSong = document.querySelector(".song-item.active-song");
      const colorBase = activeSong ? activeSong.getAttribute("data-color") : "#a072ff";

      for (let i = 0; i < dataArray.length; i++) {
        const indiceCaotico = mapaAleatorio[i % mapaAleatorio.length];
        const valorFrecuencia = dataArray[indiceCaotico] || 0; 
        const porcentajeAltura = (valorFrecuencia / 255) * 100;
        
        if (i < arrayBarras.length) {
          const barra = arrayBarras[i];
          barra.style.height = `${Math.max(porcentajeAltura, 6)}%`;

          if (valorFrecuencia > 180) {
            barra.style.background = "linear-gradient(to top, #ff007f, #00f0ff)";
            barra.style.boxShadow = "0 0 12px #00f0ff";
          } else if (valorFrecuencia > 90) {
            barra.style.background = `linear-gradient(to top, ${colorBase}, #ff007f)`;
            barra.style.boxShadow = `0 0 8px #ff007f`;
          } else {
            barra.style.background = colorBase;
            barra.style.boxShadow = `0 0 4px ${colorBase}`;
          }
        }

        if (i < recuentoGraves) {
          sumaGraves += dataArray[i];
        }
      }

      const mainDeckCard = deckTitle.closest("#fav-datapad-card");
      const cassetteContainer = document.querySelector(".cyber-tape-container");
      
      const promedioGraves = sumaGraves / recuentoGraves;
      const factorImpacto = promedioGraves / 255;

      if (!activePlayer.paused) {
        document.querySelectorAll(".reel i").forEach(reel => {
          reel.style.transform = `rotate(${window.cassetteRotation}deg)`;
        });

        if (cassetteContainer) {
          cassetteContainer.style.boxShadow = `0 0 ${15 + (factorImpacto * 15)}px ${colorBase}aa`;
        }

        if (promedioGraves > 20) {
          if (mainDeckCard) {
            mainDeckCard.classList.add("laser");
            mainDeckCard.style.borderColor = colorBase;
            mainDeckCard.style.boxShadow = `0 0 ${20 + (factorImpacto * 15)}px ${colorBase}33`;
            const escalaReactiva = factorImpacto * 1.3; 
            mainDeckCard.style.setProperty("--laser-scale", escalaReactiva);
          }
        } else {
          if (mainDeckCard) {
            mainDeckCard.style.setProperty("--laser-scale", "0");
            mainDeckCard.style.borderColor = `${colorBase}aa`;
            mainDeckCard.style.boxShadow = `0 0 15px ${colorBase}33`;
          }
        }
      } else {
        if (mainDeckCard) {
          mainDeckCard.classList.remove("laser");
          mainDeckCard.style.boxShadow = "";
          mainDeckCard.style.borderColor = `${colorBase}33`;
        }
        if (cassetteContainer) {
          cassetteContainer.style.boxShadow = "none";
        }
        document.querySelectorAll(".reel i").forEach(reel => {
          reel.style.transform = `none`;
        });
      }

      requestAnimationFrame(renderizarSincronizacionRGB);
    }

    function saltarPista(direccion) {
      const canciones = Array.from(document.querySelectorAll(".song-item"));
      const indexActiva = canciones.findIndex(s => s.classList.contains("active-song"));
      if (indexActiva === -1) return;

      let nuevoIndex = indexActiva + direccion;
      if (nuevoIndex >= canciones.length) nuevoIndex = 0;
      if (nuevoIndex < 0) nuevoIndex = canciones.length - 1;

      seleccionarCancion(canciones[nuevoIndex]);
    }

    // ========================================================
    // 📡 LECTURA DEL SERVIDOR CON SOPORTE PARA ACORDEONES ANIDADOS
    // ========================================================
    fetch('/api/playlist')
      .then(response => response.json())
      .then(playlist => {
        if (playlist.error) {
          playlistSelector.innerHTML = `<div class="text-danger font-monospace">[ ERROR // ${playlist.error} ]</div>`;
          return;
        }

        playlistSelector.innerHTML = ""; 

        playlist.forEach((album, albumIdx) => {
          const isFirst = albumIdx === 0;
          const wrapper = document.createElement("div");
          wrapper.className = "playlist-cartridge-wrapper mb-3";

          // ⚡ COMPROBACIÓN DE IMAGEN: Si el álbum tiene "album.cover" o "album.artistImg", la usamos. 
  // Si no, dejamos un icono cyberpunk por defecto (como un chip o un vinilo digital).
  const tieneImagen = album.cover && album.cover !== "null" && album.cover !== "";
  const avatarHTML = tieneImagen 
    ? `<img src="${album.cover}" alt="${album.title}" class="cartridge-avatar-img" />`
    : `<i class="bi bi-cpu"></i>`; // Icono tecnológico de respaldo si no hay foto
          
          wrapper.innerHTML = `
    <div class="playlist-cartridge p-3 d-flex align-items-center justify-content-between ${isFirst ? 'active-track' : ''}" 
         data-bs-toggle="collapse" 
         data-bs-target="#${album.id}" 
         style="--cartridge-color: ${album.color};">
      <div class="d-flex align-items-center gap-3">
        <!-- 🖼️ NUEVO CONTENEDOR DE AVATAR CYBERPUNK -->
        <div class="cartridge-cyber-avatar">
          ${avatarHTML}
        </div>
        <div>
          <h4 class="h6 fw-bold m-0 text-white">${album.title}</h4>
          <p class="text-xs text-white m-0">${album.description}</p>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2 font-monospace text-xs">
        <span class="track-status ${isFirst ? '' : 'text-white'}">${isFirst ? '[ RUNNING ]' : '[ STANDBY ]'}</span>
        <i class="bi bi-chevron-down accordion-arrow"></i>
      </div>
    </div>

    <div id="${album.id}" class="collapse ${isFirst ? 'show' : ''}" data-bs-parent="#playlist-selector">
      <div class="cartridge-content p-3 font-monospace bg-black-25" id="nested-accordion-${album.id}"></div>
    </div>
  `;

          const contentBox = wrapper.querySelector(".cartridge-content");
          let globalTrackCounter = 0;

          // 💿 A. Renderizar bloques de discos como SUB-ACORDEONES reales
          if (album.discos && album.discos.length > 0) {
            album.discos.forEach((subDisco, subIdx) => {
              const discoUniqueId = `disco-${album.id}-${subIdx}`;
              const discoBlock = document.createElement("div");
              discoBlock.className = "mb-2 border border-secondary rounded overflow-hidden bg-black-50";
              
              // Estructura colapsable anidada compatible con Bootstrap
              discoBlock.innerHTML = `
                <div class="p-2 d-flex align-items-center justify-content-between text-uppercase style-pointer" 
                     data-bs-toggle="collapse" 
                     data-bs-target="#${discoUniqueId}" 
                     style="cursor: pointer; font-size: 0.85rem; letter-spacing: 1px; color: #00f0ff;">
                  <span class="fw-bold"><i class="bi bi-disc-fill me-1 text-info"></i> ${subDisco.title}</span>
                  <i class="bi bi-chevron-right small text-white accordion-arrow"></i>
                </div>
                
                <!-- data-bs-parent apunta al contenedor padre del artista para evitar cierres cruzados -->
                <div id="${discoUniqueId}" class="collapse" data-bs-parent="#nested-accordion-${album.id}">
                  <div class="p-2 border-top border-secondary sub-tracks-container" style="background: rgba(0,0,0,0.4);"></div>
                </div>
              `;
              
              const subTracksContainer = discoBlock.querySelector(".sub-tracks-container");

              subDisco.tracks.forEach((track) => {
                globalTrackCounter++;
                const songItem = crearElementoCancion(track, globalTrackCounter, album.color, subDisco.cover);
                subTracksContainer.appendChild(songItem);
              });

              contentBox.appendChild(discoBlock);
            });
          }

          // 🎵 B. Renderizar canciones sueltas en la raíz del artista (fuera de sub-discos)
          if (album.tracksSueltos && album.tracksSueltos.length > 0) {
            album.tracksSueltos.forEach((track) => {
              globalTrackCounter++;
              const songItem = crearElementoCancion(track, globalTrackCounter, album.color, album.cover);
              contentBox.appendChild(songItem);
            });
          }

          if (isFirst) {
            const statusSpan = wrapper.querySelector(".track-status");
            statusSpan.style.color = album.color;
          }

          playlistSelector.appendChild(wrapper);
        });

        const initialSong = document.querySelector(".song-item.active-song");
        if (initialSong) {
          sincronizarDeck(initialSong);
        }
      })
      .catch(err => {
        console.error(err);
        playlistSelector.innerHTML = `<div class="text-danger font-monospace">[ CRITICAL_SERVER_ERROR ]</div>`;
      });

    function crearElementoCancion(track, index, colorArtista, coverUrl) {
      const songItem = document.createElement("div");
      const isFirstSongGlobal = index === 1;
      
      songItem.className = `song-item ${isFirstSongGlobal ? 'active-song' : ''}`;
      songItem.setAttribute("data-title", track.title);
      songItem.setAttribute("data-status", track.status);
      songItem.setAttribute("data-side", track.side);
      songItem.setAttribute("data-color", colorArtista);
      songItem.setAttribute("data-src", track.src);
      songItem.setAttribute("data-type", track.type);
      songItem.setAttribute("data-cover", coverUrl || "");
      songItem.style.setProperty("--cartridge-color", colorArtista);
      
      const isVid = track.type === 'video';
      const trackNumber = index.toString().padStart(2, '0');
      songItem.innerHTML = `
        <span class="song-index">[ TRK_${trackNumber} ]</span> 
        ${isVid ? '📹 ' : ''}${track.title} 
        <span class="song-duration">...</span>
      `;

      const tempMedia = isVid ? document.createElement("video") : document.createElement("audio");
      tempMedia.src = track.src;
      tempMedia.addEventListener("loadedmetadata", () => {
        songItem.querySelector(".song-duration").textContent = formatTime(tempMedia.duration);
      });

      songItem.addEventListener("click", function(e) {
        e.stopPropagation(); // Evita cierres accidentales al pinchar en la pista
        seleccionarCancion(this);
      });

      return songItem;
    }

    // ========================================================
    // ⏱ METADATOS TEMPORALES & CONTROLES
    // ========================================================
    const setupMediaListeners = (player) => {
      player.addEventListener("loadedmetadata", () => {
        if(player === activePlayer) {
          timeEnding.textContent = formatTime(activePlayer.duration);
          timeOpening.textContent = "00:00";
          progressBar.style.width = "0%";
        }
      });

      player.addEventListener("timeupdate", () => {
        if(player === activePlayer) {
          timeOpening.textContent = formatTime(activePlayer.currentTime);
          if (activePlayer.duration) {
            const percentage = (activePlayer.currentTime / activePlayer.duration) * 100;
            progressBar.style.width = `${percentage}%`;
          }
        }
      });

      player.addEventListener("ended", () => {
        if(player === activePlayer) {
          saltarPista(1);
        }
      });
    };

    setupMediaListeners(audioPlayer);
    setupMediaListeners(videoPlayer);

    if (prevBtn) prevBtn.addEventListener("click", (e) => { e.preventDefault(); saltarPista(-1); });
    if (nextBtn) nextBtn.addEventListener("click", (e) => { e.preventDefault(); saltarPista(1); });

    playBtn.addEventListener("click", (e) => {
      e.preventDefault();
      inicializarWebAudio();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      const activeSong = document.querySelector(".song-item.active-song");
      const activeColor = activeSong ? activeSong.getAttribute("data-color") : "#a072ff";

      if (activePlayer.paused) {
        activePlayer.play();
        playIcon.className = "bi bi-pause-circle-fill display-4";
        playIcon.style.color = activeColor;
      } else {
        activePlayer.pause();
        playIcon.className = "bi bi-play-circle-fill display-4";
        playIcon.style.color = activeColor;
      }
    });

    progressContainer.addEventListener("click", function(e) {
      if (activePlayer.duration) {
        const totalWidth = this.offsetWidth;
        const clickX = e.offsetX;
        const clickPercent = clickX / totalWidth;
        activePlayer.currentTime = clickPercent * activePlayer.duration;
      }
    });

    // Volumen Mixer
    let isDraggingVolume = false;

    function actualizarVolumenMecanico(clientX) {
      if (!cyberVolumeContainer) return;
      const rect = cyberVolumeContainer.getBoundingClientRect();
      let porcentaje = (clientX - rect.left) / rect.width;
      
      if (porcentaje < 0) porcentaje = 0;
      if (porcentaje > 1) porcentaje = 1;

      if (cyberVolumeBar) cyberVolumeBar.style.width = `${porcentaje * 100}%`;
      if (cyberVolumeThumb) cyberVolumeThumb.style.left = `calc(${porcentaje * 100}% - 5px)`;

      audioPlayer.volume = porcentaje;
      videoPlayer.volume = porcentaje;

      if (volumeIcon) {
        if (porcentaje === 0) {
          volumeIcon.className = "bi bi-volume-mute-fill text-danger";
        } else if (porcentaje < 0.5) {
          volumeIcon.className = "bi bi-volume-down-fill text-white";
        } else {
          volumeIcon.className = "bi bi-volume-up-fill text-white";
        }
      }
    }

    if (cyberVolumeContainer) {
      cyberVolumeContainer.addEventListener("mousedown", (e) => {
        isDraggingVolume = true;
        actualizarVolumenMecanico(e.clientX);
      });
      window.addEventListener("mousemove", (e) => { if (isDraggingVolume) actualizarVolumenMecanico(e.clientX); });
      window.addEventListener("mouseup", () => { isDraggingVolume = false; });
    }

    if (volumeIcon) {
      volumeIcon.addEventListener("click", () => {
        if (audioPlayer.volume > 0 || videoPlayer.volume > 0) {
          if (cyberVolumeBar) cyberVolumeBar.style.width = "0%";
          if (cyberVolumeThumb) cyberVolumeThumb.style.left = "0px";
          audioPlayer.volume = 0;
          videoPlayer.volume = 0;
          volumeIcon.className = "bi bi-volume-mute-fill text-danger";
        } else {
          if (cyberVolumeContainer) {
            actualizarVolumenMecanico(cyberVolumeContainer.getBoundingClientRect().left + 70);
          }
        }
      });
    }
  });
</script>
  </body>
</html>
